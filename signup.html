<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sign Up | Zwapy</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
:root{--cyan:#00D4FF;--bg:#010114;--navy:#020024;--border:rgba(0,212,255,0.15);--muted:#64748b;--dim:#94a3b8;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Sora',sans-serif;background:var(--bg);color:white;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.02) 2px,rgba(0,0,0,0.02) 4px);pointer-events:none;z-index:0;}
.glow{position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse 60% 50% at 50% 0%,rgba(0,212,255,0.06) 0%,transparent 70%);z-index:0;}

.card{position:relative;z-index:1;width:100%;max-width:420px;background:rgba(2,0,36,0.8);border:1px solid var(--border);border-radius:28px;padding:40px 36px;backdrop-filter:blur(20px);}
.card::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:60%;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);}

.logo{display:flex;align-items:center;justify-content:center;gap:9px;margin-bottom:28px;text-decoration:none;}
.logo span{font-size:1.4rem;font-weight:900;font-style:italic;color:white;}

.card h2{font-size:1.5rem;font-weight:900;font-style:italic;text-align:center;margin-bottom:6px;}
.card p{font-size:.8rem;color:var(--dim);text-align:center;margin-bottom:28px;}

.field{margin-bottom:18px;}
.field label{display:block;font-size:.72rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);margin-bottom:7px;}
.field input{width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:13px 16px;font-size:.9rem;color:white;font-family:'Sora',sans-serif;transition:border-color .2s,box-shadow .2s;outline:none;}
.field input::placeholder{color:var(--muted);}
.field input:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(0,212,255,0.08);}

.btn-primary{width:100%;background:var(--cyan);color:#000;border:none;border-radius:12px;padding:14px;font-size:.88rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:all .25s;margin-top:4px;position:relative;overflow:hidden;}
.btn-primary:hover{box-shadow:0 0 24px rgba(0,212,255,.45);transform:translateY(-1px);}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none;}

.divider{display:flex;align-items:center;gap:12px;margin:20px 0;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.07);}
.divider span{font-size:.68rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;}

.btn-google{width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:13px;font-size:.85rem;font-weight:700;color:white;cursor:pointer;transition:all .25s;display:flex;align-items:center;justify-content:center;gap:10px;font-family:'Sora',sans-serif;}
.btn-google:hover{border-color:rgba(255,255,255,0.25);background:rgba(255,255,255,0.07);}
.btn-google img{width:18px;height:18px;}

.foot{text-align:center;margin-top:24px;font-size:.78rem;color:var(--muted);}
.foot a{color:var(--cyan);text-decoration:none;font-weight:700;}
.foot a:hover{text-decoration:underline;}

.msg{display:none;padding:11px 14px;border-radius:10px;font-size:.78rem;font-weight:600;margin-bottom:16px;text-align:center;}
.msg.error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.25);color:#ef4444;}
.msg.success{background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.25);color:#10b981;}
</style>
</head>
<body>
<div class="glow"></div>

<div class="card">
  <a href="index.html" class="logo">
    <img src="assets/zwapy-logo.png" style="width:32px;height:32px;object-fit:contain;">
    <span>ZWAPY</span>
  </a>

  <h2>Join the Network</h2>
  <p>Create your account and start exchanging skills</p>

  <div class="msg" id="msg"></div>

  <form id="signupForm">
    <div class="field">
      <label>Full Name</label>
      <input type="text" id="name" required/>
    </div>
    <div class="field">
      <label>Email Address</label>
      <input type="email" id="email"  required/>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="Min. 6 characters" required/>
    </div>
    <button type="submit" class="btn-primary" id="submitBtn">Create Account →</button>
  </form>

  <div class="divider"><span>or</span></div>

  <button class="btn-google" id="googleBtn">
    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google"/>
    Continue with Google
  </button>

  <p class="foot">Already have an account? <a href="login.html">Log in</a></p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, updateProfile, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-auth.js";
import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyBazCIc5vdQInSwvqvohIcbPToTjnw7KJI",
  authDomain:"zwapy-25.firebaseapp.com",
  projectId:"zwapy-25",
  storageBucket:"zwapy-25.firebasestorage.app",
  messagingSenderId:"30612332450",
  appId:"1:30612332450:web:9e23f36a69f89dbb325cfb"
});
const auth = getAuth(app);
const db   = getFirestore(app);

function showMsg(text, type){
  const m = document.getElementById('msg');
  m.textContent = text;
  m.className = 'msg ' + type;
  m.style.display = 'block';
}

async function createUserDoc(user, extraName){
  const name = extraName || user.displayName || 'Student';
  await setDoc(doc(db,'users',user.uid), {
    name, email: user.email,
    university: '', skills: [],
    coins: 0, exchanges: 0, clubs: 0,
    createdAt: serverTimestamp()
  }, { merge: true });
}

// Email signup
document.getElementById('signupForm').addEventListener('submit', async e => {
  e.preventDefault();
  const btn  = document.getElementById('submitBtn');
  const name = document.getElementById('name').value.trim();
  const email= document.getElementById('email').value.trim();
  const pass = document.getElementById('password').value;
  btn.disabled = true; btn.textContent = 'Creating...';
  try {
    const cred = await createUserWithEmailAndPassword(auth, email, pass);
    await updateProfile(cred.user, { displayName: name });
    await createUserDoc(cred.user, name);
    showMsg('✅ Account created! Taking you to setup...', 'success');
    setTimeout(() => window.location.href = 'extra-details.html', 1000);
  } catch(err){
    showMsg('❌ ' + err.message, 'error');
    btn.disabled = false; btn.textContent = 'Create Account →';
  }
});

// Google signup
document.getElementById('googleBtn').addEventListener('click', async () => {
  try {
    const result = await signInWithPopup(auth, new GoogleAuthProvider());
    await createUserDoc(result.user, result.user.displayName);
    showMsg('✅ Welcome ' + result.user.displayName + '!', 'success');
    setTimeout(() => window.location.href = 'extra-details.html', 1000);
  } catch(err){
    showMsg('❌ ' + err.message, 'error');
  }
});
</script>
</body>
</html>
