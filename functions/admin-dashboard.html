<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-THCGY8NH1Z"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-THCGY8NH1Z');
</script>
<title>Admin | Zwapy</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
:root{--cyan:#00D4FF;--bg:#010114;--border:rgba(0,212,255,0.1);--muted:#64748b;--dim:#94a3b8;--red:#ef4444;--green:#10b981;--amber:#f59e0b;}
*{margin:0;padding:0;box-sizing:border-box;}
::selection{background:var(--red);color:#fff;}
body{font-family:'Sora',sans-serif;background:var(--bg);color:white;overflow-x:hidden;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.022) 2px,rgba(0,0,0,0.022) 4px);pointer-events:none;z-index:9999;}
.bg-glow{position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse 60% 40% at 20% 10%,rgba(239,68,68,0.04) 0%,transparent 60%),radial-gradient(ellipse 40% 50% at 80% 80%,rgba(0,212,255,0.03) 0%,transparent 60%);}

#loadScreen{position:fixed;inset:0;background:var(--bg);z-index:10000;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;transition:opacity .4s;}
#loadScreen.hide{opacity:0;pointer-events:none;}
.load-logo{font-size:2rem;font-weight:900;font-style:italic;color:var(--red);}
.load-bar{width:140px;height:2px;background:rgba(239,68,68,0.12);border-radius:100px;overflow:hidden;}
.load-fill{height:100%;background:var(--red);border-radius:100px;animation:lf 1s ease forwards;}
@keyframes lf{from{width:0}to{width:100%}}
.load-text{font-family:'Space Mono',monospace;font-size:.56rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);}

.layout{position:relative;z-index:10;max-width:1300px;margin:0 auto;padding:0 22px 100px;}

/* Topbar */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid rgba(239,68,68,0.1);margin-bottom:28px;position:sticky;top:0;z-index:200;background:rgba(1,1,20,0.95);backdrop-filter:blur(24px);margin-left:-22px;margin-right:-22px;padding-left:22px;padding-right:22px;gap:12px;flex-wrap:wrap;}
.topbar-logo{display:flex;align-items:center;gap:9px;text-decoration:none;}
.logo-node{width:38px;height:38px;background:rgba(239,68,68,0.07);border:1px solid rgba(239,68,68,0.2);border-radius:11px;display:flex;align-items:center;justify-content:center;}
.logo-text{font-size:1.2rem;font-weight:900;font-style:italic;}
.admin-badge{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:var(--red);border-radius:100px;padding:5px 12px;font-size:.62rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;}
.logout-btn{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:100px;padding:7px 14px;font-size:.68rem;font-weight:700;color:var(--muted);cursor:pointer;transition:all .2s;}
.logout-btn:hover{border-color:var(--red);color:var(--red);}
.switch-btn{background:rgba(0,212,255,0.08);border:1px solid rgba(0,212,255,0.25);border-radius:100px;padding:7px 14px;font-size:.68rem;font-weight:800;color:#00D4FF;cursor:pointer;transition:all .2s;text-decoration:none;display:flex;align-items:center;gap:6px;white-space:nowrap;}
.switch-btn:hover{background:rgba(0,212,255,0.16);box-shadow:0 0 14px rgba(0,212,255,.2);}

/* Page header */
.page-head{margin-bottom:24px;}
.page-label{font-family:'Space Mono',monospace;font-size:.55rem;letter-spacing:.2em;text-transform:uppercase;color:var(--red);opacity:.7;margin-bottom:5px;}
.page-title{font-size:clamp(1.4rem,5vw,2.4rem);font-weight:900;font-style:italic;}
.page-title span{color:var(--red);}

/* Stats */
.stats-row{display:grid;grid-template-columns:repeat(2,1fr);gap:11px;margin-bottom:24px;}
@media(min-width:580px){.stats-row{grid-template-columns:repeat(4,1fr);}}
.stat-card{background:rgba(255,255,255,0.025);border:1px solid var(--border);border-radius:16px;padding:16px 14px;}
.stat-label{font-family:'Space Mono',monospace;font-size:.48rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.stat-value{font-family:'Space Mono',monospace;font-size:1.6rem;font-weight:700;line-height:1;}
.sv-r{color:var(--red);text-shadow:0 0 14px rgba(239,68,68,.3);}
.sv-c{color:var(--cyan);text-shadow:0 0 14px rgba(0,212,255,.3);}
.sv-g{color:var(--green);text-shadow:0 0 14px rgba(16,185,129,.3);}
.sv-a{color:var(--amber);text-shadow:0 0 14px rgba(245,158,11,.3);}

/* Search */
.search-bar{width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:12px 16px;font-size:.88rem;color:white;font-family:'Sora',sans-serif;outline:none;transition:border-color .2s;margin-bottom:18px;}
.search-bar:focus{border-color:var(--red);}
.search-bar::placeholder{color:var(--muted);}

/* Tabs */
.tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
.tab{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:100px;padding:7px 16px;font-size:.72rem;font-weight:700;cursor:pointer;transition:all .2s;color:var(--muted);}
.tab.active{background:rgba(239,68,68,0.1);border-color:rgba(239,68,68,0.3);color:var(--red);}

/* Card */
.card{background:rgba(255,255,255,0.025);border:1px solid var(--border);border-radius:22px;padding:24px;margin-bottom:16px;}
.card-title{font-family:'Space Mono',monospace;font-size:.55rem;letter-spacing:.18em;text-transform:uppercase;color:var(--red);opacity:.7;margin-bottom:18px;}

/* User table */
.user-table{width:100%;border-collapse:collapse;}
.user-table th{font-family:'Space Mono',monospace;font-size:.5rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);padding:0 12px 12px;text-align:left;border-bottom:1px solid rgba(255,255,255,0.06);}
.user-table td{padding:12px;border-bottom:1px solid rgba(255,255,255,0.04);vertical-align:middle;font-size:.8rem;}
.user-table tr:last-child td{border-bottom:none;}
.user-table tr:hover td{background:rgba(255,255,255,0.02);}
.user-av{width:28px;height:28px;border-radius:50%;overflow:hidden;border:1px solid rgba(255,255,255,0.1);}
.user-av img{width:100%;height:100%;object-fit:cover;}
.role-pill{display:inline-block;border-radius:100px;padding:3px 10px;font-size:.6rem;font-weight:800;letter-spacing:.07em;text-transform:uppercase;}
.role-pill.student{background:rgba(0,212,255,0.08);color:var(--cyan);border:1px solid rgba(0,212,255,0.2);}
.role-pill.club_head{background:rgba(129,140,248,0.1);color:#818cf8;border:1px solid rgba(129,140,248,0.25);}
.role-pill.super_admin{background:rgba(239,68,68,0.1);color:var(--red);border:1px solid rgba(239,68,68,0.25);}
.action-btn{background:none;border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:4px 10px;font-size:.65rem;font-weight:700;cursor:pointer;transition:all .2s;font-family:'Sora',sans-serif;color:var(--muted);}
.action-btn:hover{border-color:var(--red);color:var(--red);}
.action-btn.promote{color:var(--green);border-color:rgba(16,185,129,0.2);}
.action-btn.promote:hover{border-color:var(--green);background:rgba(16,185,129,0.08);}

/* Role edit modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(8px);z-index:2000;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .3s;}
.modal-bg.open{opacity:1;pointer-events:all;}
.modal{background:rgba(2,0,36,0.98);border:1px solid rgba(239,68,68,0.2);border-radius:22px;padding:28px;width:100%;max-width:380px;transform:translateY(20px);transition:transform .3s;}
.modal-bg.open .modal{transform:translateY(0);}
.modal h3{font-size:1.1rem;font-weight:900;font-style:italic;margin-bottom:6px;}
.modal p{font-size:.76rem;color:var(--dim);margin-bottom:20px;}
.modal select{width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:11px;padding:12px 14px;font-size:.86rem;color:white;font-family:'Sora',sans-serif;outline:none;margin-bottom:16px;}
.modal select option{background:#020024;}
.modal-actions{display:flex;gap:10px;}
.modal-cancel{flex:1;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:11px;font-size:.76rem;font-weight:700;color:var(--dim);cursor:pointer;font-family:'Sora',sans-serif;}
.modal-save{flex:2;background:var(--red);border:none;border-radius:10px;padding:11px;font-size:.76rem;font-weight:800;color:white;cursor:pointer;font-family:'Sora',sans-serif;transition:all .2s;}
.modal-save:hover{box-shadow:0 0 16px rgba(239,68,68,.4);}

.empty-state{font-size:.75rem;color:var(--muted);text-align:center;padding:24px 0;font-style:italic;}

/* Toast */
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.28);border-radius:100px;padding:10px 22px;font-size:.76rem;font-weight:700;color:var(--green);z-index:3000;opacity:0;transition:all .35s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

.fade-up{opacity:0;transform:translateY(16px);transition:opacity .6s ease,transform .6s ease;}
.fade-up.in{opacity:1;transform:translateY(0);}
.d1{transition-delay:.05s;}.d2{transition-delay:.1s;}.d3{transition-delay:.15s;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:rgba(239,68,68,0.2);border-radius:100px;}
</style>
</head>
<body>
<div class="bg-glow"></div>

<div id="loadScreen">
  <div class="load-logo">ZWAPY ADMIN</div>
  <div class="load-bar"><div class="load-fill"></div></div>
  <div class="load-text">Loading admin portal...</div>
</div>

<div class="toast" id="toast"></div>

<!-- Role edit modal -->
<div class="modal-bg" id="roleModal">
  <div class="modal">
    <h3>Edit User Role</h3>
    <p id="modalUserName">—</p>
    <select id="modalRole">
      <option value="student">Student</option>
      <option value="club_head">Club Head</option>
      <option value="super_admin">Super Admin</option>
    </select>
    <div class="modal-actions">
      <button class="modal-cancel" id="modalCancel">Cancel</button>
      <button class="modal-save" id="modalSave">Save Role</button>
    </div>
  </div>
</div>

<div class="layout">
  <header class="topbar">
    <a href="#" class="topbar-logo">
      <div class="logo-node">
        <img src="assets/zwapy-logo.png" style="width:24px;height:24px;object-fit:contain;">
      </div>
      <span class="logo-text">ZWAPY</span>
    </a>
    <div class="admin-badge">⚡ Super Admin</div>
    <div style="display:flex;align-items:center;gap:8px;margin-left:auto;">
      <a href="dashboard.html" class="switch-btn">🎓 Student Portal</a>
      <button class="logout-btn" id="logoutBtn">Sign Out</button>
    </div>
  </header>

  <div class="page-head fade-up d1">
    <div class="page-label">// Super Admin Portal</div>
    <h1 class="page-title">Command <span>Center</span></h1>
  </div>

  <!-- Stats -->
  <div class="stats-row fade-up d1">
    <div class="stat-card">
      <div class="stat-label">Total Users</div>
      <div class="stat-value sv-r" id="statTotal">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Students</div>
      <div class="stat-value sv-c" id="statStudents">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Club Heads</div>
      <div class="stat-value sv-g" id="statClubHeads">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Total Coins</div>
      <div class="stat-value sv-a" id="statCoins">0</div>
    </div>
  </div>

  <!-- Users Table -->
  <div class="card fade-up d2">
    <div class="card-title">// All Users</div>

    <!-- Tabs -->
    <div class="tabs">
      <div class="tab active" onclick="filterTab('all',this)">All</div>
      <div class="tab" onclick="filterTab('student',this)">Students</div>
      <div class="tab" onclick="filterTab('club_head',this)">Club Heads</div>
    </div>

    <input class="search-bar" id="searchBar" placeholder="Search by name or email..." oninput="filterUsers()"/>

    <div style="overflow-x:auto;">
      <table class="user-table">
        <thead>
          <tr>
            <th></th>
            <th>Name</th>
            <th>Email</th>
            <th>University</th>
            <th>Role</th>
            <th>Coins</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="usersBody">
          <tr><td colspan="7"><div class="empty-state">Loading users...</div></td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-auth.js";
import { getFirestore, collection, getDocs, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore.js";

const SUPER_ADMIN_UID = 'MsCKd4jawaahdCaAGNN1LnticUE2';

const app = initializeApp({
  apiKey:"AIzaSyBazCIc5vdQInSwvqvohIcbPToTjnw7KJI",
  authDomain:"zwapy-25.firebaseapp.com",
  projectId:"zwapy-25",
  storageBucket:"zwapy-25.firebasestorage.app",
  messagingSenderId:"30612332450",
  appId:"1:30612332450:web:9e23f36a69f89dbb325cfb"
});
const auth = getAuth(app);
const db   = getFirestore(app);
await setPersistence(auth, browserLocalPersistence);

const $ = id => document.getElementById(id);
function toast(msg,col='#10b981'){
  const t=$('toast');t.textContent=msg;t.style.color=col;
  t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);
}

let allUsers = [];
let currentFilter = 'all';
let editingUid = null;

function fmt(n){ return Number(n||0).toLocaleString(); }

function renderUsers(users){
  const body = $('usersBody');
  if(!users.length){
    body.innerHTML='<tr><td colspan="7"><div class="empty-state">No users found</div></td></tr>';
    return;
  }
  body.innerHTML = users.map(u => `
    <tr>
      <td><div class="user-av"><img src="${u.photoURL||`https://api.dicebear.com/7.x/avataaars/svg?seed=${encodeURIComponent(u.name||u.uid)}`}" alt=""></div></td>
      <td><strong>${u.name||'—'}</strong></td>
      <td style="color:var(--dim);font-size:.72rem;">${u.email||'—'}</td>
      <td style="color:var(--dim);font-size:.72rem;">${u.university||'—'}</td>
      <td><span class="role-pill ${u.role||'student'}">${u.role||'student'}</span></td>
      <td style="font-family:'Space Mono',monospace;font-size:.78rem;">${fmt(u.coins)}</td>
      <td style="display:flex;gap:6px;flex-wrap:wrap;">
        <button class="action-btn promote" onclick="openRoleModal('${u.uid}','${u.name||'User'}','${u.role||'student'}')">Edit Role</button>
        ${u.uid !== SUPER_ADMIN_UID ? `<button class="action-btn" onclick="deleteUser('${u.uid}')">Delete</button>` : ''}
      </td>
    </tr>
  `).join('');
}

window.filterTab = function(filter, el){
  currentFilter = filter;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  filterUsers();
};

window.filterUsers = function(){
  const q = $('searchBar').value.toLowerCase();
  let filtered = allUsers;
  if(currentFilter !== 'all') filtered = filtered.filter(u=>(u.role||'student')===currentFilter);
  if(q) filtered = filtered.filter(u=>(u.name||'').toLowerCase().includes(q)||(u.email||'').toLowerCase().includes(q));
  renderUsers(filtered);
};

window.openRoleModal = function(uid, name, role){
  editingUid = uid;
  $('modalUserName').textContent = name;
  $('modalRole').value = role;
  $('roleModal').classList.add('open');
};

window.deleteUser = async function(uid){
  if(!confirm('Delete this user? This cannot be undone.')) return;
  await deleteDoc(doc(db,'users',uid));
  allUsers = allUsers.filter(u=>u.uid!==uid);
  filterUsers();
  toast('🗑️ User deleted','#ef4444');
  loadStats();
};

$('modalCancel').addEventListener('click',()=>$('roleModal').classList.remove('open'));
$('roleModal').addEventListener('click',e=>{if(e.target===$('roleModal'))$('roleModal').classList.remove('open');});

$('modalSave').addEventListener('click', async()=>{
  if(!editingUid) return;
  const newRole = $('modalRole').value;
  await updateDoc(doc(db,'users',editingUid),{role:newRole});
  const u = allUsers.find(x=>x.uid===editingUid);
  if(u) u.role = newRole;
  filterUsers();
  $('roleModal').classList.remove('open');
  toast('✅ Role updated');
  loadStats();
});

function loadStats(){
  let total=0, students=0, clubHeads=0, coins=0;
  allUsers.forEach(u=>{
    total++;
    if((u.role||'student')==='student') students++;
    if(u.role==='club_head') clubHeads++;
    coins += u.coins||0;
  });
  $('statTotal').textContent    = total;
  $('statStudents').textContent = students;
  $('statClubHeads').textContent= clubHeads;
  $('statCoins').textContent    = fmt(coins);
}

$('logoutBtn').addEventListener('click',()=>{
  signOut(auth).then(()=>window.location.href='login.html');
});

onAuthStateChanged(auth, async user=>{
  // Only super admin UID allowed
  if(!user || user.uid !== SUPER_ADMIN_UID){
    window.location.href = user ? 'dashboard.html' : 'login.html';
    return;
  }

  // Load all users
  const snap = await getDocs(collection(db,'users'));
  allUsers = [];
  snap.forEach(d=>{
    allUsers.push({uid:d.id, ...d.data()});
  });

  // Sort by createdAt newest first
  allUsers.sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));

  loadStats();
  renderUsers(allUsers);

  setTimeout(()=>{
    $('loadScreen').classList.add('hide');
    setTimeout(()=>{if($('loadScreen'))$('loadScreen').remove();},500);
    document.querySelectorAll('.fade-up').forEach(el=>el.classList.add('in'));
  },600);
});
</script>
</body>
</html>
