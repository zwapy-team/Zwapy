<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZwapyClubs | Infinity Core</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00D4FF; --bg: #010114; }
        body { background-color: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; color: white; overflow-x: hidden; margin: 0; }
        /* THE ANIMATED LOGO BACKGROUND */
        .bg-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            overflow: hidden;
        }
       
        /* Pulse and Rotate Animation for Background Logo */
        @keyframes drift {
            0% { transform: scale(1) rotate(0deg); opacity: 0.15; }
            50% { transform: scale(1.1) rotate(5deg); opacity: 0.25; }
            100% { transform: scale(1) rotate(0deg); opacity: 0.15; }
        }
       
        .floating-logo {
            width: 100vw; /* ← Made bigger to fill screen more */
            height: 100vw;
            max-width: 1200px;
            animation: drift 12s ease-in-out infinite;
        }
        .neo-glass {
            background: rgba(2, 0, 36, 0.7);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(0, 212, 255, 0.15);
        }
        .calendar-grid {
            display: grid; grid-template-columns: repeat(7, 1fr);
            gap: 1px; background: rgba(0, 212, 255, 0.2);
            border-radius: 2rem; overflow: hidden;
        }
        .cell {
            min-height: 120px; background: rgba(1, 1, 20, 0.95);
            padding: 1.2rem; transition: 0.4s;
        }
        .cell:hover { background: rgba(0, 212, 255, 0.1); transform: translateY(-2px); }
       
        .nav-arrow {
            font-size: 2.5rem; color: rgba(255,255,255,0.3);
            cursor: pointer; transition: 0.3s; user-select: none;
        }
        .nav-arrow:hover { color: var(--neon); text-shadow: 0 0 15px var(--neon); }
        select::-webkit-scrollbar { width: 4px; }
        select::-webkit-scrollbar-thumb { background: var(--neon); border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="bg-layer">
        <svg class="floating-logo" viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="250" cy="250" r="220" stroke="var(--neon)" stroke-width="1" stroke-dasharray="10 20" opacity="0.3" />
            <path d="M200 150C200 122.386 222.386 100 250 100C277.614 100 300 122.386 300 150V250H350C377.614 250 400 272.386 400 300C400 327.614 377.614 350 350 350H250V300H200C172.386 300 150 277.614 150 250C150 222.386 172.386 200 200 200V150Z"
                  stroke="var(--neon)" stroke-width="4" stroke-linecap="round" />
        </svg>
    </div>
    <div class="max-w-[1500px] mx-auto space-y-8 relative z-10">
       
        <nav class="flex justify-between items-center neo-glass p-5 rounded-[2rem]">
            <div class="flex items-center gap-4">
                <!-- Zwapy logo added next to title -->
                <img src="assets/zwapy-logo.png" alt="Zwapy" class="w-10 h-10 md:w-12 md:h-12 rounded-xl shadow-[0_0_20px_rgba(0,212,255,0.4)]">
                <h1 class="text-2xl font-black italic tracking-tighter uppercase">Zwapy<span class="text-[#00D4FF]">Clubs</span></h1>
            </div>
            <button class="px-8 py-3 bg-black/40 border border-[#00D4FF]/20 text-[#00D4FF] rounded-2xl font-black text-[10px] tracking-widest hover:bg-[#00D4FF] hover:text-black transition-all">
                ✦ MY UNIVERSE
            </button>
        </nav>
        <section class="neo-glass p-8 rounded-[3rem]">
            <div class="flex justify-center items-center gap-12 mb-10">
                <span class="nav-arrow">&lt;</span>
                <div class="flex items-center gap-5">
                    <h2 class="text-5xl font-black italic uppercase tracking-tighter">March</h2>
                    <select id="yearList" class="bg-transparent text-[#00D4FF] text-4xl font-light outline-none cursor-pointer">
                    </select>
                </div>
                <span class="nav-arrow">&gt;</span>
            </div>
            <div class="calendar-grid">
                <script>
                    const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
                    days.forEach(d => document.write(`<div class="p-4 text-center text-[10px] font-black uppercase tracking-widest text-slate-500 border-b border-white/5">${d}</div>`));
                   
                    for(let i=1; i<=35; i++) {
                        let dNum = i > 31 ? i-31 : i;
                        let fade = i > 31 ? 'opacity-20' : '';
                        let today = i === 7 ? 'border-2 border-[#00D4FF] shadow-[inset_0_0_20px_rgba(0,212,255,0.1)]' : '';
                        document.write(`
                            <div class="cell ${fade} ${today}">
                                <span class="text-2xl font-black italic ${i===7 ? 'text-[#00D4FF]' : 'text-slate-800'}">${dNum < 10 ? '0'+dNum : dNum}</span>
                            </div>
                        `);
                    }
                </script>
            </div>
        </section>
        <div class="grid grid-cols-1 md:grid-cols-12 gap-5 pb-10">
            <div class="md:col-span-4 neo-glass p-6 rounded-[2.5rem] flex flex-col justify-center">
                <h3 class="text-[#00D4FF] font-black uppercase text-[9px] tracking-[0.4em] mb-5 opacity-50">Quick Insights</h3>
                <div class="flex justify-between items-center px-4">
                    <div class="text-center">
                        <p class="text-3xl font-black italic leading-none">12</p>
                        <p class="text-[9px] text-slate-500 font-bold uppercase mt-1">Active</p>
                    </div>
                    <div class="text-center">
                        <p class="text-3xl font-black italic text-purple-500 leading-none">4</p>
                        <p class="text-[9px] text-slate-500 font-bold uppercase mt-1">Invites</p>
                    </div>
                    <div class="text-center">
                        <p class="text-3xl font-black italic text-[#00D4FF] leading-none">1.2k</p>
                        <p class="text-[9px] text-slate-500 font-bold uppercase mt-1">Users</p>
                    </div>
                </div>
            </div>
            <div class="md:col-span-8 bg-[#00D4FF] p-6 rounded-[2.5rem] text-black flex items-center justify-between px-10">
                <div>
                    <h3 class="text-xl font-black italic uppercase leading-none">Want to post ur event?</h3>
                    <p class="text-[10px] font-bold opacity-80 mt-1 uppercase tracking-tight">Apply in <span class="bg-black text-white px-2 py-0.5 rounded">Club Head</span> admin portal.</p>
                </div>
                <button class="bg-black text-white px-10 py-4 rounded-2xl font-black text-[11px] tracking-[0.2em] hover:scale-105 active:scale-95 transition-all shadow-xl">
                    TAKE ME →
                </button>
            </div>
        </div>
    </div>
    <script>
        const yr = document.getElementById('yearList');
        for (let y = 2026; y <= 10000; y++) {
            const o = document.createElement('option');
            o.value = y; o.innerHTML = y; o.className = "bg-[#010114] text-white";
            yr.appendChild(o);
        }
    </script>
</body>
</html>
