<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zwapy Clubs | Calendar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00D4FF; --bg: #010114; }
        body { background-color: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; color: white; margin: 0; overflow-x: hidden; }
        
        /* Full background rotating Zwapy logo watermark */
        .bg-logo {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 80%; max-width: 1200px;
            opacity: 0.04;
            z-index: -1;
            animation: rotateSlow 40s linear infinite;
            pointer-events: none;
        }
        @keyframes rotateSlow { 0% { transform: translate(-50%, -50%) rotate(0deg); } 100% { transform: translate(-50%, -50%) rotate(360deg); } }

        .neo-glass { background: rgba(2,0,36,0.75); backdrop-filter: blur(20px); border: 1px solid rgba(0,212,255,0.15); border-radius: 1.5rem; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: rgba(0,212,255,0.2); border-radius: 2rem; overflow: hidden; }
        .cell { min-height: 120px; background: rgba(1,1,20,0.95); padding: 1.2rem; transition: 0.4s; cursor: pointer; }
        .cell:hover { background: rgba(0,212,255,0.1); transform: translateY(-2px); }
        .nav-arrow { font-size: 2.5rem; color: rgba(255,255,255,0.3); cursor: pointer; transition: 0.3s; user-select: none; }
        .nav-arrow:hover { color: var(--neon); text-shadow: 0 0 15px var(--neon); }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); }
        .modal-content { background: var(--bg); margin: 15% auto; padding: 30px; border-radius: 16px; width: 90%; max-width: 500px; border: 1px solid var(--neon); }
        .close { color: var(--neon); float: right; font-size: 32px; font-weight: bold; cursor: pointer; }
        .close:hover { color: white; }
        h1 { color: #ffd93d; }
        .month-header { grid-column: 1 / -1; text-align: center; font-size: 2.5rem; font-weight: 800; letter-spacing: -1px; }
    </style>
</head>
<body class="p-4 md:p-12 min-h-screen relative">
    <!-- Large rotating Zwapy logo in background -->
    <div class="bg-logo">
        <svg viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="250" cy="250" r="220" stroke="#00D4FF" stroke-width="1" stroke-dasharray="10 20" opacity="0.3" />
            <path d="M200 150C200 122.386 222.386 100 250 100C277.614 100 300 122.386 300 150V250H350C377.614 250 400 272.386 400 300C400 327.614 377.614 350 350 350H250V300H200C172.386 300 150 277.614 150 250C150 222.386 172.386 200 200 200V150Z" stroke="#00D4FF" stroke-width="4" stroke-linecap="round" />
        </svg>
    </div>

    <div class="max-w-7xl mx-auto space-y-10 relative z-10">
        <!-- Header with Zwapy logo next to title -->
        <nav class="flex justify-between items-center neo-glass p-6 md:p-8 rounded-3xl">
            <div class="flex items-center gap-5">
                <img src="assets/zwapy-logo.png" alt="Zwapy Logo" class="w-12 h-12 md:w-16 md:h-16 rounded-xl shadow-[0_0_20px_rgba(0,212,255,0.4)]">
                <h1 class="text-3xl md:text-5xl font-black italic tracking-tight uppercase">
                    Zwapy<span class="text-[#00D4FF]">Clubs</span>
                </h1>
            </div>
            <button class="px-6 py-3 md:px-10 md:py-4 bg-black/50 border border-[#00D4FF]/30 text-[#00D4FF] rounded-2xl font-black text-sm md:text-base tracking-widest hover:bg-[#00D4FF] hover:text-black transition-all">
                ✦ MY UNIVERSE
            </button>
        </nav>

        <!-- Calendar Section -->
        <section class="neo-glass p-6 md:p-10 rounded-3xl">
            <div class="flex justify-center items-center gap-8 md:gap-16 mb-8 md:mb-12">
                <span class="nav-arrow" onclick="changeMonth(-1)">&lt;</span>
                <div class="flex items-center gap-6">
                    <h2 class="text-4xl md:text-6xl font-black italic uppercase tracking-tighter" id="monthName">July</h2>
                    <select id="yearList" class="bg-transparent text-[#00D4FF] text-3xl md:text-5xl font-light outline-none cursor-pointer" onchange="changeYear(this.value)">
                        <option value="2025">2025</option>
                        <option value="2026">2026</option>
                    </select>
                </div>
                <span class="nav-arrow" onclick="changeMonth(1)">&gt;</span>
            </div>

            <div class="calendar-grid" id="calendarGrid">
                <!-- Days and cells generated by JS -->
            </div>
        </section>

        <!-- Quick Insights + Admin Call to Action -->
        <div class="grid grid-cols-1 md:grid-cols-12 gap-6">
            <div class="md:col-span-4 neo-glass p-8 rounded-3xl flex flex-col justify-center">
                <h3 class="text-[#00D4FF] font-black uppercase text-sm tracking-[0.4em] mb-6 opacity-60">Quick Insights</h3>
                <div class="flex justify-between items-center px-4 text-center">
                    <div>
                        <p class="text-4xl md:text-5xl font-black italic leading-none" id="activeEvents">0</p>
                        <p class="text-xs md:text-sm text-slate-500 font-bold uppercase mt-2">Active Events</p>
                    </div>
                    <div>
                        <p class="text-4xl md:text-5xl font-black italic text-purple-500 leading-none" id="invites">0</p>
                        <p class="text-xs md:text-sm text-slate-500 font-bold uppercase mt-2">Invites</p>
                    </div>
                    <div>
                        <p class="text-4xl md:text-5xl font-black italic text-[#00D4FF] leading-none" id="totalUsers">0</p>
                        <p class="text-xs md:text-sm text-slate-500 font-bold uppercase mt-2">Club Members</p>
                    </div>
                </div>
            </div>

            <div class="md:col-span-8 neo-glass p-8 rounded-3xl flex flex-col md:flex-row items-center justify-between gap-6 md:gap-12">
                <div>
                    <h3 class="text-2xl md:text-3xl font-black italic uppercase leading-tight">Want to post your event?</h3>
                    <p class="text-sm md:text-base text-gray-400 mt-2">Only club heads can post & edit events</p>
                </div>
                <button onclick="openAdminPortal()" class="bg-[#00D4FF] text-black px-10 md:px-16 py-4 md:py-6 rounded-2xl font-black text-base md:text-xl tracking-widest hover:bg-white hover:text-black transition-all shadow-xl">
                    GO TO CLUB HEAD ADMIN PORTAL →
                </button>
            </div>
        </div>
    </div>

    <!-- Event Detail Modal -->
    <div id="eventModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle" class="text-3xl font-bold mb-4"></h2>
            <p id="modalDescription" class="text-lg text-gray-300 mb-6"></p>
            <div class="flex gap-4">
                <button class="like-btn" onclick="likeEventModal()">Like ❤️</button>
                <button id="editBtnModal" class="edit-btn" onclick="toggleEditModal()" style="display:none;">Edit (Club Head Only)</button>
            </div>
        </div>
    </div>

    <script>
        // Mock: no events by default (everything zero until club heads post)
        let currentEvents = []; // ← empty on purpose

        let currentMonth = 7; // July
        let currentYear = 2025;

        function generateCalendar() {
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';

            // Day headers
            ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d => {
                grid.innerHTML += `<div class="p-4 text-center text-sm font-black uppercase text-slate-500 border-b border-white/10">${d}</div>`;
            });

            // 42 cells (6 weeks) to cover any month
            for (let i = 1; i <= 42; i++) {
                let dNum = i > 31 ? i - 31 : i;
                let fade = i > 31 ? 'opacity-30' : '';
                let cell = document.createElement('div');
                cell.className = `cell ${fade}`;
                cell.innerHTML = `<span class="text-3xl font-black italic">${dNum < 10 ? '0'+dNum : dNum}</span>`;
                cell.onclick = () => showEvents(dNum);
                grid.appendChild(cell);
            }

            // Add any events (currently none)
            currentEvents.forEach(e => {
                const cell = document.querySelectorAll('.cell')[e.date - 1];
                if (cell) {
                    const div = document.createElement('div');
                    div.className = 'event mt-2 p-2 rounded bg-white/5';
                    div.innerHTML = `<div class="font-bold">${e.title}</div>`;
                    cell.appendChild(div);
                }
            });

            // Show zero counts
            document.getElementById('activeEvents').innerText = currentEvents.length;
            document.getElementById('invites').innerText = '0';
            document.getElementById('totalUsers').innerText = '0';
        }

        function showEvents(date) {
            const events = currentEvents.filter(e => e.date === date);
            const modal = document.getElementById('eventModal');
            const title = document.getElementById('modalTitle');
            const desc = document.getElementById('modalDescription');
            const editBtn = document.getElementById('editBtnModal');

            if (events.length > 0) {
                title.innerHTML = events[0].title;
                desc.innerHTML = events[0].description || 'No description yet';
                editBtn.style.display = events[0].clubHead ? 'inline-block' : 'none';
            } else {
                title.innerHTML = `No events on ${date} ${document.getElementById('monthName').innerText}`;
                desc.innerHTML = 'Club heads can post events in the admin portal.';
                editBtn.style.display = 'none';
            }

            modal.style.display = 'block';
        }

        function closeModal() {
            document.getElementById('eventModal').style.display = 'none';
        }

        function openAdminPortal() {
            alert("Redirecting to Club Head Admin Portal (full backend coming soon)...");
            // Later: window.location.href = '/admin/club-head';
        }

        function changeMonth(dir) {
            currentMonth += dir;
            if (currentMonth < 1) { currentMonth = 12; currentYear--; }
            if (currentMonth > 12) { currentMonth = 1; currentYear++; }
            document.getElementById('monthName').innerText = new Date(currentYear, currentMonth-1).toLocaleString('default', { month: 'long' });
            generateCalendar();
        }

        function changeYear(year) {
            currentYear = parseInt(year);
            document.getElementById('monthName').innerText = new Date(currentYear, currentMonth-1).toLocaleString('default', { month: 'long' });
            generateCalendar();
        }

        // Init
        generateCalendar();
        document.getElementById('monthName').innerText = 'July';
    </script>
</body>
</html>
