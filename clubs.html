<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Zwapy Clubs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon: #00d4ff;
            --bg: #0a001f;
            --card: rgba(10, 0, 31, 0.75);
        }
        body {
            background: var(--bg);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #e0e0ff;
            margin: 0;
            overflow-x: hidden;
        }
        .bg-logo {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 70vmin; max-width: 1000px;
            opacity: 0.035;
            z-index: -1;
            animation: rotateSlow 45s linear infinite;
            pointer-events: none;
        }
        @keyframes rotateSlow {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to   { transform: translate(-50%, -50%) rotate(360deg); }
        }
        .neo-glass {
            background: var(--card);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(0,212,255,0.12);
            border-radius: 1.25rem;
        }
        .cell {
            background: rgba(15, 5, 40, 0.92);
            transition: all 0.25s ease;
            cursor: pointer;
            border-radius: 0.5rem;
        }
        .cell:hover {
            background: rgba(0,212,255,0.08);
            transform: scale(1.03);
        }
        .event {
            background: rgba(0,212,255,0.08);
            border-left: 3px solid var(--neon);
            padding: 0.4rem 0.6rem;
            margin: 0.3rem 0;
            border-radius: 0.4rem;
            font-size: 0.85rem;
            cursor: pointer;
        }
        .event:hover {
            background: rgba(0,212,255,0.15);
        }
        .modal-content {
            background: rgba(10,0,31,0.96);
            border: 1px solid var(--neon);
            box-shadow: 0 0 35px rgba(0,212,255,0.2);
        }
        .text-smaller { font-size: 0.95rem; line-height: 1.4; }
    </style>
</head>
<body class="p-5 md:p-8 lg:p-10 min-h-screen relative">

    <!-- Full-page rotating Zwapy logo -->
    <div class="bg-logo pointer-events-none">
        <svg viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="250" cy="250" r="220" stroke="#00D4FF" stroke-width="1.2" stroke-dasharray="12 24" opacity="0.35"/>
            <path d="M200 150C200 122 222 100 250 100C278 100 300 122 300 150V250H350C378 250 400 272 400 300C400 328 378 350 350 350H250V300H200C172 300 150 278 150 250C150 222 172 200 200 200V150Z" stroke="#00D4FF" stroke-width="2.8" stroke-linecap="round"/>
        </svg>
    </div>

    <div class="max-w-7xl mx-auto space-y-8 relative z-10">
        <!-- Header with logo next to title -->
        <nav class="neo-glass flex items-center justify-between p-5 md:p-6 rounded-2xl">
            <div class="flex items-center gap-4">
                <img src="assets/zwapy-logo.png" alt="Zwapy" class="w-10 h-10 md:w-12 md:h-12 rounded-xl shadow-[0_0_16px_rgba(0,212,255,0.3)]">
                <h1 class="text-2xl md:text-3xl font-black italic tracking-tight uppercase">
                    Zwapy<span class="text-[var(--neon)]">Clubs</span>
                </h1>
            </div>
            <button class="px-5 md:px-7 py-2.5 md:py-3 bg-black/50 border border-[var(--neon)]/25 text-[var(--neon)] rounded-xl text-xs md:text-sm font-bold tracking-wider hover:bg-[var(--neon)] hover:text-black transition-all">
                MY UNIVERSE ✦
            </button>
        </nav>

        <!-- Calendar -->
        <section class="neo-glass p-5 md:p-8 rounded-2xl">
            <div class="flex items-center justify-center gap-6 md:gap-10 mb-6">
                <span class="nav-arrow text-3xl md:text-4xl cursor-pointer select-none" onclick="changeMonth(-1)">‹</span>
                <div class="flex items-center gap-4">
                    <h2 class="text-2xl md:text-3xl font-black italic uppercase tracking-tight" id="monthName"></h2>
                    <select id="yearList" class="bg-transparent text-[var(--neon)] text-xl md:text-2xl font-medium outline-none cursor-pointer" onchange="changeYear(this.value)"></select>
                </div>
                <span class="nav-arrow text-3xl md:text-4xl cursor-pointer select-none" onclick="changeMonth(1)">›</span>
            </div>

            <div class="calendar-grid" id="calendarGrid"></div>
        </section>

        <!-- Clean Insights + CTA -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <!-- Insights -->
            <div class="neo-glass p-6 md:p-8 rounded-2xl text-center">
                <h3 class="text-[var(--neon)] font-black uppercase text-xs tracking-[0.4em] mb-6 opacity-70">QUICK INSIGHTS</h3>
                <div class="grid grid-cols-3 gap-6">
                    <div>
                        <p class="text-3xl md:text-4xl font-black leading-none text-white" id="activeEvents">0</p>
                        <p class="text-xs text-slate-400 font-medium uppercase mt-2">Active Events</p>
                    </div>
                    <div>
                        <p class="text-3xl md:text-4xl font-black leading-none text-purple-300" id="invites">0</p>
                        <p class="text-xs text-slate-400 font-medium uppercase mt-2">Invites</p>
                    </div>
                    <div>
                        <p class="text-3xl md:text-4xl font-black leading-none text-[var(--neon)]" id="totalUsers">0</p>
                        <p class="text-xs text-slate-400 font-medium uppercase mt-2">Club Members</p>
                    </div>
                </div>
            </div>

            <!-- Admin CTA -->
            <div class="neo-glass p-6 md:p-8 rounded-2xl flex flex-col md:flex-row items-center justify-between gap-6">
                <div class="text-center md:text-left">
                    <h3 class="text-xl md:text-2xl font-black leading-tight">Want to post your event?</h3>
                    <p class="text-sm md:text-base text-slate-300 mt-1">Only club heads can post & edit events</p>
                </div>
                <button onclick="openAdminPortal()" class="bg-[var(--neon)] text-black px-8 md:px-12 py-3 md:py-4 rounded-xl font-bold text-sm md:text-base tracking-wider hover:bg-white hover:text-black transition-all shadow-md">
                    GO TO CLUB HEAD ADMIN PORTAL →
                </button>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div id="eventModal" class="modal fixed inset-0 bg-black/85 hidden flex items-center justify-center z-50">
        <div class="modal-content neo-glass p-6 md:p-10 rounded-2xl max-w-md w-[90%] relative">
            <span class="close absolute top-3 right-5 text-3xl cursor-pointer" onclick="closeModal()">×</span>
            <h2 id="modalTitle" class="text-xl md:text-2xl font-black mb-3"></h2>
            <p id="modalDescription" class="text-sm md:text-base text-slate-200"></p>
        </div>
    </div>

    <script>
        let currentMonth = new Date().getMonth() + 1; // real current month (1-12)
        let currentYear  = new Date().getFullYear(); // real year

        // No events by default
        let currentEvents = [];

        function generateCalendar() {
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';

            ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d => {
                grid.innerHTML += `<div class="p-3 text-center text-xs font-bold uppercase text-slate-500 border-b border-white/10">${d}</div>`;
            });

            const firstDay = new Date(currentYear, currentMonth-1, 1).getDay();
            const daysInMonth = new Date(currentYear, currentMonth, 0).getDate();

            // Empty cells before 1st
            for (let i = 0; i < firstDay; i++) {
                grid.innerHTML += `<div class="cell opacity-30"></div>`;
            }

            // Real days
            for (let d = 1; d <= daysInMonth; d++) {
                let cell = document.createElement('div');
                cell.className = 'cell text-center';
                cell.innerHTML = `<span class="text-lg md:text-xl font-bold">${d}</span>`;
                cell.onclick = () => showEvents(d);
                grid.appendChild(cell);
            }

            // Fill remaining to 42 cells
            const remaining = 42 - (firstDay + daysInMonth);
            for (let i = 0; i < remaining; i++) {
                grid.innerHTML += `<div class="cell opacity-30"></div>`;
            }

            document.getElementById('monthName').innerText = new Date(currentYear, currentMonth-1).toLocaleString('default', { month: 'long' });
            document.getElementById('activeEvents').innerText = '0';
            document.getElementById('invites').innerText = '0';
            document.getElementById('totalUsers').innerText = '0';
        }

        function showEvents(date) {
            const modal = document.getElementById('eventModal');
            document.getElementById('modalTitle').innerText = `${date} ${document.getElementById('monthName').innerText} ${currentYear}`;
            document.getElementById('modalDescription').innerHTML = 'No events scheduled yet.<br><br>Club heads can post & edit events in the <strong>Club Head Admin Portal</strong>.';
            modal.classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('eventModal').classList.add('hidden');
        }

        function openAdminPortal() {
            alert("Redirecting to Club Head Admin Portal (full backend coming soon)...");
        }

        function changeMonth(dir) {
            currentMonth += dir;
            if (currentMonth < 1) { currentMonth = 12; currentYear--; }
            if (currentMonth > 12) { currentMonth = 1; currentYear++; }
            generateCalendar();
        }

        function changeYear(year) {
            currentYear = parseInt(year);
            generateCalendar();
        }

        // Init
        generateCalendar();
    </script>
</body>
</html>
