<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZwapyClubs | Infinity Core</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00D4FF; --bg: #010114; }
        body { background-color: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; color: white; overflow-x: hidden; margin: 0; }
        .bg-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            overflow: hidden;
        }
        @keyframes drift {
            0% { transform: scale(1) rotate(0deg); opacity: 0.15; }
            50% { transform: scale(1.1) rotate(5deg); opacity: 0.25; }
            100% { transform: scale(1) rotate(0deg); opacity: 0.15; }
        }
        .floating-logo {
            width: 60vw;
            height: 60vw;
            max-width: 800px;
            animation: drift 12s ease-in-out infinite;
        }
        .neo-glass {
            background: rgba(2, 0, 36, 0.7);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(0, 212, 255, 0.15);
        }
        .calendar-grid {
            display: grid; grid-template-columns: repeat(7, 1fr);
            gap: 1px; background: rgba(0, 212, 255, 0.2);
            border-radius: 2rem; overflow: hidden;
        }
        .cell {
            min-height: 140px; /* Bigger cells for 3 lines of description */
            background: rgba(1, 1, 20, 0.95);
            padding: 1.2rem;
            transition: 0.4s;
            cursor: pointer;
        }
        .cell:hover { background: rgba(0, 212, 255, 0.1); transform: translateY(-2px); }
        .nav-arrow {
            font-size: 2.5rem; color: rgba(255,255,255,0.3);
            cursor: pointer; transition: 0.3s; user-select: none;
        }
        .nav-arrow:hover { color: var(--neon); text-shadow: 0 0 15px var(--neon); }
        select::-webkit-scrollbar { width: 4px; }
        select::-webkit-scrollbar-thumb { background: var(--neon); border-radius: 10px; }
        .event {
            background: rgba(0,212,255,0.08);
            border-left: 3px solid var(--neon);
            padding: 0.5rem 0.75rem;
            margin: 0.4rem 0;
            border-radius: 0.5rem;
            font-size: 0.9rem;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 3; /* 3 lines visible */
            -webkit-box-orient: vertical;
        }
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            display: none; align-items: center; justify-content: center; z-index: 50;
        }
        .modal-content {
            background: var(--card);
            border: 1px solid var(--neon);
            border-radius: 1rem;
            padding: 1.5rem 2rem;
            max-width: 90%;
            width: 32rem;
            position: relative;
        }
        .close { position: absolute; top: 1rem; right: 1.5rem; font-size: 2rem; cursor: pointer; color: var(--neon); }
        .close:hover { color: white; }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="bg-layer">
        <svg class="floating-logo" viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="250" cy="250" r="220" stroke="var(--neon)" stroke-width="1" stroke-dasharray="10 20" opacity="0.3" />
            <path d="M200 150C200 122.386 222.386 100 250 100C277.614 100 300 122.386 300 150V250H350C377.614 250 400 272.386 400 300C400 327.614 377.614 350 350 350H250V300H200C172.386 300 150 277.614 150 250C150 222.386 172.386 200 200 200V150Z"
                  stroke="var(--neon)" stroke-width="4" stroke-linecap="round" />
        </svg>
    </div>
    <div class="max-w-[1500px] mx-auto space-y-8 relative z-10">
        <nav class="flex justify-between items-center neo-glass p-5 rounded-[2rem]">
            <div class="flex items-center gap-4">
                <div class="w-11 h-11 bg-[#00D4FF] rounded-2xl flex items-center justify-center shadow-[0_0_20px_rgba(0,212,255,0.4)]">
                    <span class="text-black font-black text-2xl italic leading-none">Z</span>
                </div>
                <h1 class="text-2xl font-black italic tracking-tighter uppercase">Zwapy<span class="text-[#00D4FF]">Clubs</span></h1>
            </div>
            <button class="px-8 py-3 bg-black/40 border border-[#00D4FF]/20 text-[#00D4FF] rounded-2xl font-black text-[10px] tracking-widest hover:bg-[#00D4FF] hover:text-black transition-all">
                ✦ MY UNIVERSE
            </button>
        </nav>

        <section class="neo-glass p-8 rounded-[3rem]">
            <div class="flex justify-center items-center gap-12 mb-10">
                <span class="nav-arrow cursor-pointer" onclick="changeMonth(-1)">&lt;</span>
                <div class="flex items-center gap-5">
                    <h2 class="text-5xl font-black italic uppercase tracking-tighter" id="monthName"></h2>
                    <select id="yearList" class="bg-transparent text-[#00D4FF] text-4xl font-light outline-none cursor-pointer" onchange="changeYear(this.value)">
                    </select>
                </div>
                <span class="nav-arrow cursor-pointer" onclick="changeMonth(1)">&gt;</span>
            </div>

            <div class="calendar-grid" id="calendarGrid"></div>
        </section>

        <div class="grid grid-cols-1 md:grid-cols-12 gap-5 pb-10">
            <div class="md:col-span-4 neo-glass p-6 rounded-[2.5rem] flex flex-col justify-center">
                <h3 class="text-[#00D4FF] font-black uppercase text-[9px] tracking-[0.4em] mb-5 opacity-50">Quick Insights</h3>
                <div class="flex justify-between items-center px-4">
                    <div class="text-center">
                        <p class="text-3xl font-black italic leading-none" id="activeEvents">0</p>
                        <p class="text-[9px] text-slate-500 font-bold uppercase mt-1">Active</p>
                    </div>
                    <div class="text-center">
                        <p class="text-3xl font-black italic text-purple-500 leading-none" id="invites">0</p>
                        <p class="text-[9px] text-slate-500 font-bold uppercase mt-1">Invites</p>
                    </div>
                    <div class="text-center">
                        <p class="text-3xl font-black italic text-[#00D4FF] leading-none" id="totalUsers">0</p>
                        <p class="text-[9px] text-slate-500 font-bold uppercase mt-1">Users</p>
                    </div>
                </div>
            </div>

            <div class="md:col-span-8 bg-[#00D4FF] p-6 rounded-[2.5rem] text-black flex items-center justify-between px-10">
                <div>
                    <h3 class="text-xl font-black italic uppercase leading-none">Want to post ur event?</h3>
                    <p class="text-[10px] font-bold opacity-80 mt-1 uppercase tracking-tight">Apply in <span class="bg-black text-white px-2 py-0.5 rounded">Club Head</span> admin portal.</p>
                </div>
                <button class="bg-black text-white px-10 py-4 rounded-2xl font-black text-[11px] tracking-[0.2em] hover:scale-105 active:scale-95 transition-all shadow-xl" onclick="openAdminPortal()">
                    TAKE ME →
                </button>
            </div>
        </div>
    </div>

    <!-- Modal for Full Event Description -->
    <div id="eventModal" class="modal fixed inset-0 bg-black/85 hidden flex items-center justify-center z-50">
        <div class="modal-content neo-glass p-6 md:p-10 rounded-2xl max-w-lg w-[90%] relative">
            <span class="close absolute top-3 right-5 text-3xl cursor-pointer" onclick="closeModal()">×</span>
            <h2 id="modalTitle" class="text-xl md:text-2xl font-black mb-3"></h2>
            <p id="modalDescription" class="text-sm md:text-base text-slate-200 mb-6"></p>
            <div class="flex flex-wrap gap-3 mt-4">
                <a href="#" class="bg-[var(--neon)] text-black px-6 py-2 rounded-lg font-medium hover:bg-white transition-all">Join Event</a>
                <a href="#" class="border border-[var(--neon)] text-[var(--neon)] px-6 py-2 rounded-lg font-medium hover:bg-[var(--neon)] hover:text-black transition-all">View Club</a>
            </div>
        </div>
    </div>

    <script>
        // Real current date
        const today = new Date();
        let currentMonth = today.getMonth() + 1;
        let currentYear = today.getFullYear();

        // No events by default
        let currentEvents = [];

        function generateCalendar() {
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';

            const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            days.forEach(d => {
                grid.innerHTML += `<div class="p-4 text-center text-[10px] font-black uppercase tracking-widest text-slate-500 border-b border-white/5">${d}</div>`;
            });

            const firstDay = new Date(currentYear, currentMonth-1, 1).getDay();
            const daysInMonth = new Date(currentYear, currentMonth, 0).getDate();

            for (let i = 0; i < firstDay; i++) {
                grid.innerHTML += `<div class="cell opacity-20"></div>`;
            }

            for (let d = 1; d <= daysInMonth; d++) {
                let cell = document.createElement('div');
                cell.className = 'cell';
                cell.innerHTML = `<span class="text-2xl font-black italic">${d < 10 ? '0'+d : d}</span>`;
                cell.onclick = () => showEvents(d);
                grid.appendChild(cell);
            }

            const remaining = 42 - (firstDay + daysInMonth);
            for (let i = 0; i < remaining; i++) {
                grid.innerHTML += `<div class="cell opacity-20"></div>`;
            }

            document.getElementById('monthName').innerText = new Date(currentYear, currentMonth-1).toLocaleString('default', { month: 'long' });
        }

        function showEvents(date) {
            const modal = document.getElementById('eventModal');
            document.getElementById('modalTitle').innerText = `${date} ${document.getElementById('monthName').innerText} ${currentYear}`;
            document.getElementById('modalDescription').innerHTML = 'No events scheduled yet.<br><br>Club heads can post & edit events in the <strong>Club Head Admin Portal</strong>.<br><br><a href="#" class="text-[var(--neon)] underline">Join Event</a> | <a href="#" class="text-[var(--neon)] underline">View Club</a>';
            modal.style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('eventModal').style.display = 'none';
        }

        function openAdminPortal() {
            alert("Redirecting to Club Head Admin Portal...");
        }

        function changeMonth(dir) {
            currentMonth += dir;
            if (currentMonth < 1) { currentMonth = 12; currentYear--; }
            if (currentMonth > 12) { currentMonth = 1; currentYear++; }
            generateCalendar();
        }

        function changeYear(year) {
            currentYear = parseInt(year);
            generateCalendar();
        }

        // Populate year dropdown
        const yr = document.getElementById('yearList');
        for (let y = currentYear - 2; y <= currentYear + 5; y++) {
            const o = document.createElement('option');
            o.value = y; o.innerHTML = y; o.className = "bg-[#010114] text-white";
            yr.appendChild(o);
        }

        // Init
        generateCalendar();
    </script>
</body>
</html>
