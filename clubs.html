<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Zwapy Clubs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon: #00d4ff;
            --bg: #0a001f;
            --card: rgba(10, 0, 31, 0.7);
        }
        body {
            background: var(--bg);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: white;
            margin: 0;
            overflow-x: hidden;
        }
        /* Large subtle rotating background logo */
        .bg-logo {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 90vmin; max-width: 1100px;
            opacity: 0.04;
            z-index: -2;
            animation: rotateSlow 50s linear infinite;
            pointer-events: none;
        }
        @keyframes rotateSlow {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to   { transform: translate(-50%, -50%) rotate(360deg); }
        }
        .neo-glass {
            background: var(--card);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(0,212,255,0.12);
            border-radius: 1.25rem;
        }
        .club-card {
            background: rgba(0,212,255,0.06);
            border: 1px solid rgba(0,212,255,0.18);
            transition: all 0.35s ease;
        }
        .club-card:hover {
            transform: translateY(-6px) scale(1.02);
            background: rgba(0,212,255,0.12);
            box-shadow: 0 20px 40px rgba(0,212,255,0.15);
        }
        .cell {
            background: rgba(1,1,20,0.92);
            transition: all 0.25s ease;
            cursor: pointer;
        }
        .cell:hover {
            background: rgba(0,212,255,0.08);
            transform: scale(1.03);
        }
        .modal-content {
            background: rgba(10,0,31,0.95);
            border: 1px solid var(--neon);
            box-shadow: 0 0 40px rgba(0,212,255,0.25);
        }
    </style>
</head>
<body class="p-5 md:p-8 lg:p-12 min-h-screen relative">

    <!-- Large rotating Zwapy logo background -->
    <div class="bg-logo pointer-events-none">
        <svg viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="250" cy="250" r="220" stroke="#00D4FF" stroke-width="1.5" stroke-dasharray="12 24" opacity="0.4"/>
            <path d="M200 150C200 122 222 100 250 100C278 100 300 122 300 150V250H350C378 250 400 272 400 300C400 328 378 350 350 350H250V300H200C172 300 150 278 150 250C150 222 172 200 200 200V150Z" stroke="#00D4FF" stroke-width="3" stroke-linecap="round"/>
        </svg>
    </div>

    <div class="max-w-7xl mx-auto space-y-10 md:space-y-12 relative z-10">
        <!-- Header -->
        <nav class="neo-glass flex items-center justify-between p-5 md:p-7 rounded-2xl md:rounded-3xl">
            <div class="flex items-center gap-4 md:gap-5">
                <img src="assets/zwapy-logo.png" alt="Zwapy" class="w-10 h-10 md:w-14 md:h-14 rounded-xl shadow-[0_0_20px_rgba(0,212,255,0.35)]">
                <h1 class="text-2xl md:text-3xl font-black italic tracking-tight uppercase">
                    Zwapy<span class="text-[var(--neon)]">Clubs</span>
                </h1>
            </div>
            <button class="px-5 md:px-8 py-3 md:py-4 bg-black/50 border border-[var(--neon)]/30 text-[var(--neon)] rounded-xl md:rounded-2xl font-bold text-xs md:text-sm tracking-widest hover:bg-[var(--neon)] hover:text-black transition-all">
                MY UNIVERSE ✦
            </button>
        </nav>

        <!-- Calendar -->
        <section class="neo-glass p-6 md:p-8 lg:p-10 rounded-2xl md:rounded-3xl">
            <div class="flex items-center justify-center gap-6 md:gap-10 mb-6 md:mb-8">
                <span class="nav-arrow text-3xl md:text-4xl" onclick="changeMonth(-1)">‹</span>
                <div class="flex items-center gap-4 md:gap-6">
                    <h2 class="text-3xl md:text-4xl lg:text-5xl font-black italic uppercase tracking-tight" id="monthName">July</h2>
                    <select id="yearList" class="bg-transparent text-[var(--neon)] text-2xl md:text-3xl lg:text-4xl font-light outline-none cursor-pointer" onchange="changeYear(this.value)">
                        <option value="2025">2025</option>
                        <option value="2026">2026</option>
                    </select>
                </div>
                <span class="nav-arrow text-3xl md:text-4xl" onclick="changeMonth(1)">›</span>
            </div>

            <div class="calendar-grid" id="calendarGrid"></div>
        </section>

        <!-- Insights + CTA -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 lg:gap-8">
            <!-- Insights -->
            <div class="neo-glass p-6 md:p-8 rounded-2xl text-center">
                <h3 class="text-[var(--neon)] font-black uppercase text-xs md:text-sm tracking-[0.4em] mb-6 opacity-70">QUICK INSIGHTS</h3>
                <div class="grid grid-cols-3 gap-6 md:gap-10">
                    <div>
                        <p class="text-4xl md:text-5xl font-black leading-none" id="activeEvents">0</p>
                        <p class="text-xs md:text-sm text-slate-400 font-medium uppercase mt-2">Active Events</p>
                    </div>
                    <div>
                        <p class="text-4xl md:text-5xl font-black leading-none text-purple-400" id="invites">0</p>
                        <p class="text-xs md:text-sm text-slate-400 font-medium uppercase mt-2">Invites</p>
                    </div>
                    <div>
                        <p class="text-4xl md:text-5xl font-black leading-none text-[var(--neon)]" id="totalUsers">0</p>
                        <p class="text-xs md:text-sm text-slate-400 font-medium uppercase mt-2">Club Members</p>
                    </div>
                </div>
            </div>

            <!-- Club Head CTA -->
            <div class="neo-glass p-6 md:p-8 rounded-2xl flex flex-col md:flex-row items-center justify-between gap-6 md:gap-10">
                <div class="text-center md:text-left">
                    <h3 class="text-xl md:text-2xl font-black leading-tight">Want to post your event?</h3>
                    <p class="text-sm md:text-base text-slate-300 mt-2">Only club heads can post & edit events</p>
                </div>
                <button onclick="openAdminPortal()" class="bg-[var(--neon)] text-black px-8 md:px-12 py-4 md:py-5 rounded-xl md:rounded-2xl font-black text-sm md:text-base tracking-wider hover:bg-white hover:text-black transition-all shadow-lg hover:shadow-[0_0_30px_rgba(0,212,255,0.4)]">
                    GO TO CLUB HEAD ADMIN PORTAL →
                </button>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div id="eventModal" class="modal fixed inset-0 bg-black/80 hidden flex items-center justify-center z-50">
        <div class="modal-content neo-glass p-6 md:p-10 rounded-2xl max-w-lg w-[90%] relative">
            <span class="close absolute top-4 right-6 text-4xl cursor-pointer" onclick="closeModal()">×</span>
            <h2 id="modalTitle" class="text-2xl md:text-3xl font-black mb-4"></h2>
            <p id="modalDescription" class="text-base md:text-lg text-slate-200"></p>
        </div>
    </div>

    <script>
        // No events by default (zero state)
        let currentEvents = []; // Club heads post real ones via admin

        let currentMonth = 7;
        let currentYear = 2025;

        function generateCalendar() {
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';

            ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d => {
                grid.innerHTML += `<div class="p-3 md:p-4 text-center text-xs md:text-sm font-black uppercase text-slate-500 border-b border-white/10">${d}</div>`;
            });

            for (let i = 1; i <= 42; i++) {
                let dNum = i > 31 ? i - 31 : i;
                let fade = i > 31 ? 'opacity-40' : '';
                let cell = document.createElement('div');
                cell.className = `cell ${fade} text-center`;
                cell.innerHTML = `<span class="text-xl md:text-2xl font-black">${dNum < 10 ? '0'+dNum : dNum}</span>`;
                cell.onclick = () => showEvents(dNum);
                grid.appendChild(cell);
            }

            // Show zero counts
            document.getElementById('activeEvents').innerText = '0';
            document.getElementById('invites').innerText = '0';
            document.getElementById('totalUsers').innerText = '0';
        }

        function showEvents(date) {
            const modal = document.getElementById('eventModal');
            document.getElementById('modalTitle').innerText = `Date: ${date} ${document.getElementById('monthName').innerText} ${currentYear}`;
            document.getElementById('modalDescription').innerHTML = 'No events scheduled yet.<br><br>Club heads can post events in the <strong>Club Head Admin Portal</strong>.';
            modal.classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('eventModal').classList.add('hidden');
        }

        function openAdminPortal() {
            alert("Redirecting to Club Head Admin Portal (coming soon - full backend integration with Yashas)...");
        }

        function changeMonth(dir) {
            currentMonth += dir;
            if (currentMonth < 1) { currentMonth = 12; currentYear--; }
            if (currentMonth > 12) { currentMonth = 1; currentYear++; }
            document.getElementById('monthName').innerText = new Date(currentYear, currentMonth-1).toLocaleString('default', { month: 'long' });
            generateCalendar();
        }

        function changeYear(year) {
            currentYear = parseInt(year);
            document.getElementById('monthName').innerText = new Date(currentYear, currentMonth-1).toLocaleString('default', { month: 'long' });
            generateCalendar();
        }

        // Init
        generateCalendar();
        document.getElementById('monthName').innerText = 'July';
    </script>
</body>
</html>
