<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Club Dashboard | Zwapy</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
:root{--cyan:#00D4FF;--bg:#010114;--navy:#020024;--border:rgba(0,212,255,0.1);--border-h:rgba(0,212,255,0.35);--muted:#64748b;--dim:#94a3b8;--indigo:#818cf8;--green:#10b981;}
*{margin:0;padding:0;box-sizing:border-box;}
::selection{background:var(--cyan);color:#000;}
body{font-family:'Sora',sans-serif;background:var(--bg);color:white;overflow-x:hidden;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.02) 2px,rgba(0,0,0,0.02) 4px);pointer-events:none;z-index:9999;}
.bg-glow{position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse 60% 40% at 20% 20%,rgba(99,102,241,0.05) 0%,transparent 60%),radial-gradient(ellipse 40% 50% at 80% 80%,rgba(0,212,255,0.04) 0%,transparent 60%);}

#loadScreen{position:fixed;inset:0;background:var(--bg);z-index:10000;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;transition:opacity .4s;}
#loadScreen.hide{opacity:0;pointer-events:none;}
.load-logo{font-size:2rem;font-weight:900;font-style:italic;color:var(--indigo);}
.load-bar{width:140px;height:2px;background:rgba(129,140,248,0.15);border-radius:100px;overflow:hidden;}
.load-fill{height:100%;background:var(--indigo);border-radius:100px;animation:lf 1s ease forwards;}
@keyframes lf{from{width:0}to{width:100%}}
.load-text{font-family:'Space Mono',monospace;font-size:.56rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);}

.layout{position:relative;z-index:10;max-width:1200px;margin:0 auto;padding:0 22px 100px;}

/* Topbar */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid rgba(129,140,248,0.1);margin-bottom:28px;position:sticky;top:0;z-index:200;background:rgba(1,1,20,0.93);backdrop-filter:blur(24px);margin-left:-22px;margin-right:-22px;padding-left:22px;padding-right:22px;gap:12px;}
.topbar-logo{display:flex;align-items:center;gap:9px;text-decoration:none;flex-shrink:0;}
.logo-node{width:38px;height:38px;background:rgba(129,140,248,0.08);border:1px solid rgba(129,140,248,0.2);border-radius:11px;display:flex;align-items:center;justify-content:center;}
.logo-text{font-size:1.2rem;font-weight:900;font-style:italic;}
.portal-badge{background:rgba(129,140,248,0.1);border:1px solid rgba(129,140,248,0.25);color:var(--indigo);border-radius:100px;padding:5px 12px;font-size:.62rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;}
.topbar-right{display:flex;align-items:center;gap:8px;}
.user-name{font-size:.82rem;font-weight:700;display:none;}
@media(min-width:540px){.user-name{display:block;}}
.avatar-ring{width:36px;height:36px;border-radius:50%;border:2px solid rgba(129,140,248,0.3);overflow:hidden;flex-shrink:0;}
.avatar-ring img{width:100%;height:100%;object-fit:cover;}
.logout-btn{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:100px;padding:7px 14px;font-size:.68rem;font-weight:700;color:var(--muted);cursor:pointer;transition:all .2s;}
.logout-btn:hover{border-color:#ef4444;color:#ef4444;background:rgba(239,68,68,0.08);}

/* Page header */
.page-head{margin-bottom:28px;}
.page-label{font-family:'Space Mono',monospace;font-size:.55rem;letter-spacing:.2em;text-transform:uppercase;color:var(--indigo);opacity:.7;margin-bottom:5px;}
.page-title{font-size:clamp(1.5rem,5vw,2.6rem);font-weight:900;font-style:italic;letter-spacing:-.02em;}
.page-title span{color:var(--indigo);}
.page-sub{font-size:.8rem;color:var(--dim);margin-top:6px;}

/* Stats */
.stats-row{display:grid;grid-template-columns:repeat(2,1fr);gap:11px;margin-bottom:24px;}
@media(min-width:580px){.stats-row{grid-template-columns:repeat(4,1fr);}}
.stat-card{background:rgba(255,255,255,0.025);border:1px solid var(--border);border-radius:16px;padding:16px 14px;}
.stat-label{font-family:'Space Mono',monospace;font-size:.48rem;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.stat-value{font-family:'Space Mono',monospace;font-size:1.5rem;font-weight:700;line-height:1;}
.sv-i{color:var(--indigo);}
.sv-c{color:var(--cyan);}
.sv-g{color:var(--green);}
.sv-a{color:#f59e0b;}

/* Grid */
.main-grid{display:grid;grid-template-columns:1fr;gap:18px;}
@media(min-width:900px){.main-grid{grid-template-columns:1fr 320px;}}

/* Card */
.card{background:rgba(255,255,255,0.025);border:1px solid var(--border);border-radius:22px;padding:24px;margin-bottom:16px;transition:border-color .3s;}
.card:hover{border-color:rgba(129,140,248,0.2);}
.card-title{font-family:'Space Mono',monospace;font-size:.56rem;letter-spacing:.18em;text-transform:uppercase;color:var(--indigo);opacity:.7;margin-bottom:18px;}

/* Form fields */
.field{margin-bottom:14px;}
.field label{display:block;font-size:.62rem;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--dim);margin-bottom:6px;}
.field input,.field select,.field textarea{width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:11px;padding:11px 14px;font-size:.86rem;color:white;font-family:'Sora',sans-serif;outline:none;transition:border-color .2s;}
.field input::placeholder,.field textarea::placeholder{color:var(--muted);}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--indigo);}
.field textarea{resize:vertical;min-height:80px;}
.field select option{background:#020024;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:480px){.field-row{grid-template-columns:1fr;}}

.btn-indigo{background:var(--indigo);color:#000;border:none;border-radius:11px;padding:12px 24px;font-size:.8rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:all .25s;}
.btn-indigo:hover{box-shadow:0 0 20px rgba(129,140,248,.4);transform:translateY(-1px);}
.btn-indigo:disabled{opacity:.5;cursor:not-allowed;transform:none;}

/* Post list */
.post-item{padding:14px 0;border-bottom:1px solid rgba(255,255,255,0.05);display:flex;align-items:flex-start;gap:12px;}
.post-item:last-child{border-bottom:none;}
.post-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px;}
.post-dot.event{background:var(--cyan);}
.post-dot.announcement{background:var(--indigo);}
.post-dot.hackathon{background:#f59e0b;}
.post-content{flex:1;}
.post-title{font-size:.85rem;font-weight:700;margin-bottom:3px;}
.post-meta{font-size:.68rem;color:var(--muted);}
.post-date{font-family:'Space Mono',monospace;font-size:.55rem;color:var(--muted);flex-shrink:0;}
.post-delete{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.75rem;padding:2px 6px;border-radius:6px;transition:all .2s;flex-shrink:0;}
.post-delete:hover{color:#ef4444;background:rgba(239,68,68,0.1);}
.empty-state{font-size:.75rem;color:var(--muted);text-align:center;padding:20px 0;font-style:italic;}

/* Members list */
.member-item{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid rgba(255,255,255,0.05);}
.member-item:last-child{border-bottom:none;}
.member-av{width:32px;height:32px;border-radius:50%;overflow:hidden;border:2px solid rgba(129,140,248,0.2);flex-shrink:0;}
.member-av img{width:100%;height:100%;object-fit:cover;}
.member-name{font-size:.82rem;font-weight:700;flex:1;}
.member-role{font-size:.62rem;color:var(--muted);}

/* Toast */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(129,140,248,0.1);border:1px solid rgba(129,140,248,0.28);border-radius:100px;padding:10px 22px;font-size:.76rem;font-weight:700;color:var(--indigo);z-index:3000;opacity:0;transition:all .35s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

.fade-up{opacity:0;transform:translateY(16px);transition:opacity .6s ease,transform .6s ease;}
.fade-up.in{opacity:1;transform:translateY(0);}
.d1{transition-delay:.05s;}.d2{transition-delay:.1s;}.d3{transition-delay:.15s;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:rgba(129,140,248,0.2);border-radius:100px;}
</style>
</head>
<body>
<div class="bg-glow"></div>

<div id="loadScreen">
  <div class="load-logo">ZWAPY</div>
  <div class="load-bar"><div class="load-fill"></div></div>
  <div class="load-text">Loading club portal...</div>
</div>

<div class="toast" id="toast"></div>

<div class="layout">
  <header class="topbar">
    <a href="#" class="topbar-logo">
      <div class="logo-node">
        <img src="assets/zwapy-logo.png" style="width:24px;height:24px;object-fit:contain;">
      </div>
      <span class="logo-text">ZWAPY</span>
    </a>
    <div class="portal-badge">🛡️ Club Portal</div>
    <div class="topbar-right">
      <span class="user-name" id="topName">—</span>
      <div class="avatar-ring">
        <img id="topAvatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=club" alt="">
      </div>
      <button class="logout-btn" id="logoutBtn">Sign Out</button>
    </div>
  </header>

  <div class="page-head fade-up d1">
    <div class="page-label">// Club Head Portal</div>
    <h1 class="page-title"><span id="clubNameTitle">Your Club</span></h1>
    <p class="page-sub" id="clubUni">—</p>
  </div>

  <!-- Stats -->
  <div class="stats-row fade-up d1">
    <div class="stat-card">
      <div class="stat-label">Members</div>
      <div class="stat-value sv-i" id="statMembers">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Events Posted</div>
      <div class="stat-value sv-c" id="statEvents">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Announcements</div>
      <div class="stat-value sv-g" id="statAnnounce">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Hackathons</div>
      <div class="stat-value sv-a" id="statHack">0</div>
    </div>
  </div>

  <div class="main-grid">
    <div>
      <!-- POST FORM -->
      <div class="card fade-up d2">
        <div class="card-title">// Create Post</div>
        <div class="field">
          <label>Post Type</label>
          <select id="postType">
            <option value="event">📅 Event</option>
            <option value="hackathon">💻 Hackathon</option>
            <option value="announcement">📢 Announcement</option>
          </select>
        </div>
        <div class="field">
          <label>Title</label>
          <input type="text" id="postTitle" placeholder="e.g. Web Dev Workshop 2025"/>
        </div>
        <div class="field">
          <label>Description</label>
          <textarea id="postDesc" placeholder="Tell students what this is about..."></textarea>
        </div>
        <div class="field-row">
          <div class="field">
            <label>Date</label>
            <input type="date" id="postDate"/>
          </div>
          <div class="field">
            <label>Time</label>
            <input type="time" id="postTime"/>
          </div>
        </div>
        <div class="field">
          <label>Venue / Location</label>
          <input type="text" id="postVenue" placeholder="e.g. Room 301, Block A"/>
        </div>
        <div class="field">
          <label>Poster Image URL <span style="font-weight:400;text-transform:none;font-size:.58rem;color:var(--muted)">(optional — paste image link)</span></label>
          <input type="url" id="postPoster" placeholder="https://... paste image URL"/>
        </div>
        <div class="field">
          <label>Registration / Info Link <span style="font-weight:400;text-transform:none;font-size:.58rem;color:var(--muted)">(optional)</span></label>
          <input type="url" id="postLink" placeholder="https://forms.google.com/..."/>
        </div>
        <button class="btn-indigo" id="postBtn">Publish Post →</button>
      </div>

      <!-- POSTS LIST -->
      <div class="card fade-up d3">
        <div class="card-title">// Your Posts</div>
        <div id="postsList"><div class="empty-state">No posts yet — create your first one above</div></div>
      </div>
    </div>

    <!-- RIGHT COL -->
    <div>
      <!-- MEMBERS -->
      <div class="card fade-up d2">
        <div class="card-title">// Club Members</div>
        <div id="membersList"><div class="empty-state">No members yet</div></div>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-auth.js";
import {
  getFirestore, doc, getDoc, collection,
  addDoc, serverTimestamp, query, where,
  orderBy, onSnapshot, deleteDoc, getDocs
} from "https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyBazCIc5vdQInSwvqvohIcbPToTjnw7KJI",
  authDomain:"zwapy-25.firebaseapp.com",
  projectId:"zwapy-25",
  storageBucket:"zwapy-25.firebasestorage.app",
  messagingSenderId:"30612332450",
  appId:"1:30612332450:web:9e23f36a69f89dbb325cfb"
});
const auth = getAuth(app);
const db   = getFirestore(app);
await setPersistence(auth, browserLocalPersistence);

const $ = id => document.getElementById(id);
function toast(msg){ const t=$('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000); }
function fmt(d){ if(!d) return ''; return new Date(d.seconds*1000).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}); }

onAuthStateChanged(auth, async user=>{
  if(!user){window.location.href='login.html';return;}

  // Role check — only club_head allowed
  const userSnap = await getDoc(doc(db,'users',user.uid));
  if(!userSnap.exists() || userSnap.data().role !== 'club_head'){
    window.location.href='dashboard.html';
    return;
  }

  const ud = userSnap.data();
  const avatarUrl = ud.photoURL || user.photoURL ||
    `https://api.dicebear.com/7.x/avataaars/svg?seed=${encodeURIComponent(ud.name||'club')}`;

  $('topName').textContent      = ud.name || 'Club Head';
  $('topAvatar').src            = avatarUrl;
  $('clubNameTitle').textContent= ud.clubName || 'Your Club';
  $('clubUni').textContent      = ud.university || '';

  // Logout
  $('logoutBtn').addEventListener('click',()=>{
    signOut(auth).then(()=>window.location.href='login.html');
  });

  // ── POSTS ──
  const postsRef = collection(db,'clubs',user.uid,'posts');
  const postsQ   = query(postsRef, orderBy('createdAt','desc'));

  onSnapshot(postsQ, snap=>{
    const list = $('postsList');
    let events=0, announces=0, hacks=0;

    if(snap.empty){
      list.innerHTML='<div class="empty-state">No posts yet — create your first one above</div>';
    } else {
      list.innerHTML='';
      snap.forEach(d=>{
        const p=d.data();
        if(p.type==='event') events++;
        else if(p.type==='announcement') announces++;
        else if(p.type==='hackathon') hacks++;

        const div=document.createElement('div');
        div.className='post-item';
        div.innerHTML=`
          <div class="post-dot ${p.type||'event'}"></div>
          <div class="post-content">
            <div class="post-title">${p.title||'Untitled'}</div>
            <div class="post-meta">${p.type||'event'} ${p.venue?'· '+p.venue:''} ${p.date?'· '+p.date:''}</div>
          </div>
          <div class="post-date">${fmt(p.createdAt)}</div>
          <button class="post-delete" data-id="${d.id}">✕</button>`;
        list.appendChild(div);
      });

      // Delete handler
      list.querySelectorAll('.post-delete').forEach(btn=>{
        btn.addEventListener('click', async()=>{
          await deleteDoc(doc(db,'clubs',user.uid,'posts',btn.dataset.id));
          toast('🗑️ Post deleted');
        });
      });
    }

    $('statEvents').textContent  = events;
    $('statAnnounce').textContent= announces;
    $('statHack').textContent    = hacks;
  });

  // ── MEMBERS ──
  const clubSnap = await getDoc(doc(db,'clubs',user.uid));
  if(clubSnap.exists()){
    const members = clubSnap.data().members || [];
    $('statMembers').textContent = members.length;

    if(members.length > 0){
      const ml = $('membersList');
      ml.innerHTML='';
      for(const uid of members){
        const ms = await getDoc(doc(db,'users',uid));
        if(ms.exists()){
          const m=ms.data();
          const div=document.createElement('div');
          div.className='member-item';
          div.innerHTML=`
            <div class="member-av"><img src="${m.photoURL||`https://api.dicebear.com/7.x/avataaars/svg?seed=${encodeURIComponent(m.name||uid)}`}" alt=""></div>
            <div><div class="member-name">${m.name||'Student'}</div><div class="member-role">${m.role||'Student'} · ${m.university||''}</div></div>`;
          ml.appendChild(div);
        }
      }
    }
  }

  // ── PUBLISH POST ──
  $('postBtn').addEventListener('click', async()=>{
    const title = $('postTitle').value.trim();
    const desc  = $('postDesc').value.trim();
    const type  = $('postType').value;
    const date  = $('postDate').value;
    const time  = $('postTime').value;
    const venue = $('postVenue').value.trim();
    const poster= $('postPoster').value.trim();
    const link  = $('postLink').value.trim();

    if(!title){toast('❌ Please add a title');return;}

    const btn=$('postBtn');
    btn.disabled=true;btn.textContent='Publishing...';

    await addDoc(postsRef,{
      title, desc, type, date, time, venue,
      posterUrl: poster||'',
      link: link||'',
      clubName:ud.clubName||'',
      university:ud.university||'',
      createdAt:serverTimestamp()
    });

    $('postTitle').value='';$('postDesc').value='';
    $('postDate').value='';$('postTime').value='';$('postVenue').value='';
    $('postPoster').value='';$('postLink').value='';
    toast('✅ Post published!');
    btn.disabled=false;btn.textContent='Publish Post →';
  });

  // Hide loader
  setTimeout(()=>{
    $('loadScreen').classList.add('hide');
    setTimeout(()=>{if($('loadScreen'))$('loadScreen').remove();},500);
    document.querySelectorAll('.fade-up').forEach(el=>el.classList.add('in'));
  },600);
});
</script>
</body>
</html>
