<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Setup Profile | Zwapy</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
:root{--cyan:#00D4FF;--bg:#010114;--border:rgba(0,212,255,0.15);--muted:#64748b;--dim:#94a3b8;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Sora',sans-serif;background:var(--bg);color:white;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.02) 2px,rgba(0,0,0,0.02) 4px);pointer-events:none;z-index:0;}
.glow{position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse 60% 50% at 50% 0%,rgba(0,212,255,0.06) 0%,transparent 70%);z-index:0;}

.card{position:relative;z-index:1;width:100%;max-width:460px;background:rgba(2,0,36,0.8);border:1px solid var(--border);border-radius:28px;padding:40px 36px;backdrop-filter:blur(20px);}
.card::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:60%;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);}

.logo{display:flex;align-items:center;justify-content:center;gap:9px;margin-bottom:28px;text-decoration:none;}
.logo span{font-size:1.4rem;font-weight:900;font-style:italic;color:white;}

.step-bar{display:flex;align-items:center;gap:8px;margin-bottom:28px;justify-content:center;}
.step{width:28px;height:4px;border-radius:100px;background:rgba(255,255,255,0.1);}
.step.done{background:var(--cyan);}
.step.active{background:rgba(0,212,255,0.5);}

.card h2{font-size:1.4rem;font-weight:900;font-style:italic;text-align:center;margin-bottom:6px;}
.card p{font-size:.8rem;color:var(--dim);text-align:center;margin-bottom:28px;}

.field{margin-bottom:20px;}
.field label{display:block;font-size:.72rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);margin-bottom:7px;}
.field input,.field select{width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:13px 16px;font-size:.9rem;color:white;font-family:'Sora',sans-serif;transition:border-color .2s,box-shadow .2s;outline:none;appearance:none;}
.field input::placeholder{color:var(--muted);}
.field input:focus,.field select:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(0,212,255,0.08);}
.field select option{background:#020024;color:white;}

/* Skills tag input */
.skills-wrap{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:10px 12px;min-height:52px;display:flex;flex-wrap:wrap;gap:7px;align-items:center;cursor:text;transition:border-color .2s,box-shadow .2s;}
.skills-wrap:focus-within{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(0,212,255,0.08);}
.skill-chip{display:flex;align-items:center;gap:5px;background:rgba(0,212,255,0.1);border:1px solid rgba(0,212,255,0.22);border-radius:100px;padding:3px 10px;font-size:.7rem;font-weight:700;color:var(--cyan);white-space:nowrap;}
.skill-chip button{background:none;border:none;color:var(--cyan);cursor:pointer;font-size:.75rem;padding:0;line-height:1;opacity:.7;}
.skill-chip button:hover{opacity:1;}
.skill-input{background:none;border:none;outline:none;color:white;font-family:'Sora',sans-serif;font-size:.85rem;min-width:100px;flex:1;}
.skill-input::placeholder{color:var(--muted);}
.skill-hint{font-size:.65rem;color:var(--muted);margin-top:5px;}

.btn-primary{width:100%;background:var(--cyan);color:#000;border:none;border-radius:12px;padding:14px;font-size:.88rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:all .25s;margin-top:4px;}
.btn-primary:hover{box-shadow:0 0 24px rgba(0,212,255,.4);transform:translateY(-1px);}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none;}

.msg{display:none;padding:11px 14px;border-radius:10px;font-size:.78rem;font-weight:600;margin-bottom:16px;text-align:center;}
.msg.error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.25);color:#ef4444;}
.msg.success{background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.25);color:#10b981;}
</style>
</head>
<body>
<div class="glow"></div>

<div class="card">
  <a href="index.html" class="logo">
    <svg width="28" height="28" viewBox="0 0 42 42" fill="none">
      <circle cx="21" cy="21" r="4.5" fill="#00D4FF"/>
      <circle cx="10" cy="14" r="2.5" fill="#00D4FF" opacity=".8"/>
      <circle cx="32" cy="14" r="2.5" fill="#00D4FF" opacity=".8"/>
      <circle cx="10" cy="28" r="2.5" fill="#00D4FF" opacity=".8"/>
      <circle cx="32" cy="28" r="2.5" fill="#00D4FF" opacity=".8"/>
      <line x1="21" y1="16.5" x2="10" y2="14" stroke="#00D4FF" stroke-width="1.5" opacity=".6"/>
      <line x1="21" y1="16.5" x2="32" y2="14" stroke="#00D4FF" stroke-width="1.5" opacity=".6"/>
      <line x1="21" y1="25.5" x2="10" y2="28" stroke="#00D4FF" stroke-width="1.5" opacity=".6"/>
      <line x1="21" y1="25.5" x2="32" y2="28" stroke="#00D4FF" stroke-width="1.5" opacity=".6"/>
      <circle cx="21" cy="21" r="19" stroke="#00D4FF" stroke-width=".8" stroke-dasharray="3 4" opacity=".3"/>
    </svg>
    <span>ZWAPY</span>
  </a>

  <div class="step-bar">
    <div class="step done"></div>
    <div class="step active"></div>
    <div class="step"></div>
  </div>

  <h2>Complete Your Profile</h2>
  <p>Tell us about yourself so we can match you better</p>

  <div class="msg" id="msg"></div>

  <form id="detailsForm">
    <div class="field">
      <label>University</label>
      <input type="text" id="university" placeholder="e.g. Presidency University" required/>
    </div>

    <div class="field">
      <label>Your Skills <span style="color:var(--muted);font-weight:400;text-transform:none;letter-spacing:0">(press Enter or comma to add)</span></label>
      <div class="skills-wrap" id="skillsWrap">
        <input class="skill-input" id="skillInput" placeholder="e.g. UI Design, Python, Video Editing..."/>
      </div>
      <div class="skill-hint">Add at least 1 skill. These show on your profile.</div>
    </div>

    <div class="field">
      <label>Role</label>
      <select id="role">
        <option value="Student">Student</option>
        <option value="Founder">Founder</option>
        <option value="Designer">Designer</option>
        <option value="Developer">Developer</option>
        <option value="Marketer">Marketer</option>
        <option value="Creator">Creator</option>
      </select>
    </div>

    <button type="submit" class="btn-primary" id="submitBtn">Complete Setup →</button>
  </form>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-auth.js";
import { getFirestore, doc, updateDoc } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyBazCIc5vdQInSwvqvohIcbPToTjnw7KJI",
  authDomain:"zwapy-25.firebaseapp.com",
  projectId:"zwapy-25",
  storageBucket:"zwapy-25.firebasestorage.app",
  messagingSenderId:"30612332450",
  appId:"1:30612332450:web:9e23f36a69f89dbb325cfb"
});
const auth = getAuth(app);
const db   = getFirestore(app);

// redirect if not logged in
onAuthStateChanged(auth, user => {
  if(!user) window.location.href = 'login.html';
});

// ── SKILLS TAG INPUT ──
const skills = [];
const wrap   = document.getElementById('skillsWrap');
const input  = document.getElementById('skillInput');

function addSkill(val){
  const s = val.trim().replace(/,$/,'').trim();
  if(!s || skills.includes(s)) return;
  skills.push(s);
  const chip = document.createElement('div');
  chip.className = 'skill-chip';
  chip.innerHTML = `${s}<button type="button" onclick="removeSkill(this,'${s}')">✕</button>`;
  wrap.insertBefore(chip, input);
  input.value = '';
}

window.removeSkill = (btn, s) => {
  skills.splice(skills.indexOf(s), 1);
  btn.closest('.skill-chip').remove();
};

input.addEventListener('keydown', e => {
  if(e.key === 'Enter'){ e.preventDefault(); addSkill(input.value); }
  if(e.key === ','){ e.preventDefault(); addSkill(input.value); }
});
input.addEventListener('blur', () => { if(input.value.trim()) addSkill(input.value); });
wrap.addEventListener('click', () => input.focus());

// ── FORM SUBMIT ──
function showMsg(text, type){
  const m = document.getElementById('msg');
  m.textContent = text; m.className = 'msg ' + type; m.style.display = 'block';
}

document.getElementById('detailsForm').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  const uni  = document.getElementById('university').value.trim();
  const role = document.getElementById('role').value;

  if(!uni){ showMsg('❌ Please enter your university', 'error'); return; }
  if(skills.length === 0){ showMsg('❌ Please add at least one skill', 'error'); return; }

  btn.disabled = true; btn.textContent = 'Saving...';

  // add any pending skill in the input box
  if(input.value.trim()) addSkill(input.value);

  const user = auth.currentUser;
  try {
    await updateDoc(doc(db,'users',user.uid), { university: uni, skills, role });
    showMsg('✅ Profile saved! Loading your dashboard...', 'success');
    setTimeout(() => window.location.href = 'dashboard.html', 1000);
  } catch(err){
    showMsg('❌ ' + err.message, 'error');
    btn.disabled = false; btn.textContent = 'Complete Setup →';
  }
});
</script>
</body>
</html>
