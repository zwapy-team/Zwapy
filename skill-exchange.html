<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Skill Exchange | Zwapy</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --cyan:#00D4FF;--cyan-dim:rgba(0,212,255,0.1);
  --bg:#010114;--border:rgba(0,212,255,0.1);--border-h:rgba(0,212,255,0.28);
  --muted:#64748b;--dim:#94a3b8;--green:#10b981;--amber:#f59e0b;--indigo:#818cf8;--red:#ef4444;
}
*{margin:0;padding:0;box-sizing:border-box;}
::selection{background:var(--cyan);color:#000;}
body{font-family:'Sora',sans-serif;background:var(--bg);color:white;overflow-x:hidden;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.02) 2px,rgba(0,0,0,0.02) 4px);pointer-events:none;z-index:9999;}
.bg-glow{position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 60% 40% at 10% 20%,rgba(0,212,255,0.04) 0%,transparent 60%),
             radial-gradient(ellipse 40% 50% at 90% 80%,rgba(16,185,129,0.03) 0%,transparent 60%);}

#loadScreen{position:fixed;inset:0;background:var(--bg);z-index:10000;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;transition:opacity .3s;}
#loadScreen.hide{opacity:0;pointer-events:none;}
.load-logo{font-size:2rem;font-weight:900;font-style:italic;color:var(--cyan);}
.load-bar{width:140px;height:2px;background:rgba(0,212,255,0.1);border-radius:100px;overflow:hidden;}
.load-fill{height:100%;background:var(--cyan);border-radius:100px;animation:lf .8s ease forwards;}
@keyframes lf{from{width:0}to{width:100%}}
.load-text{font-family:'Space Mono',monospace;font-size:.54rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);}

.layout{position:relative;z-index:10;max-width:1100px;margin:0 auto;padding:0 22px 110px;}

.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid rgba(0,212,255,0.06);margin-bottom:28px;position:sticky;top:0;z-index:200;background:rgba(1,1,20,0.93);backdrop-filter:blur(24px);margin-left:-22px;margin-right:-22px;padding-left:22px;padding-right:22px;}
.topbar-logo{display:flex;align-items:center;gap:9px;text-decoration:none;}
.logo-node{width:38px;height:38px;background:rgba(0,212,255,0.07);border:1px solid rgba(0,212,255,0.2);border-radius:11px;display:flex;align-items:center;justify-content:center;}
.logo-text{font-size:1.25rem;font-weight:900;font-style:italic;}
.back-btn{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:100px;padding:7px 14px;font-size:.72rem;font-weight:700;color:var(--dim);text-decoration:none;transition:all .2s;}
.back-btn:hover{border-color:var(--cyan);color:white;}

/* Page Head */
.page-head{margin-bottom:28px;}
.page-label{font-family:'Space Mono',monospace;font-size:.55rem;letter-spacing:.22em;text-transform:uppercase;color:var(--cyan);opacity:.6;margin-bottom:5px;}
.page-title{font-size:clamp(1.8rem,5vw,3rem);font-weight:900;font-style:italic;letter-spacing:-.03em;line-height:1;}
.page-title span{color:var(--cyan);}
.page-sub{font-size:.82rem;color:var(--dim);margin-top:8px;}

/* Tabs */
.tab-row{display:flex;gap:8px;margin-bottom:24px;border-bottom:1px solid rgba(255,255,255,0.06);padding-bottom:0;overflow-x:auto;}
.tab-btn{background:none;border:none;border-bottom:2px solid transparent;padding:10px 18px;font-size:.78rem;font-weight:700;color:var(--muted);cursor:pointer;transition:all .2s;white-space:nowrap;}
.tab-btn.active{color:var(--cyan);border-bottom-color:var(--cyan);}
.tab-content{display:none;}
.tab-content.active{display:block;}

/* Post Form */
.post-card{background:rgba(255,255,255,0.025);border:1px solid var(--border);border-radius:20px;padding:20px;margin-bottom:18px;}
.field{margin-bottom:12px;}
.field label{display:block;font-size:.6rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);margin-bottom:5px;}
.field input,.field select,.field textarea{width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:11px 13px;font-size:.86rem;color:white;outline:none;}
.field textarea{resize:vertical;min-height:80px;}
.post-btn{width:100%;background:var(--cyan);color:#000;border:none;border-radius:10px;padding:13px;font-size:.82rem;font-weight:800;cursor:pointer;margin-top:8px;}

/* Exchange Grid */
.ex-grid{display:grid;grid-template-columns:1fr;gap:12px;}
@media(min-width:520px){.ex-grid{grid-template-columns:repeat(auto-fill,minmax(280px,1fr));}}
.ex-card{background:rgba(255,255,255,0.025);border:1px solid var(--border);border-radius:16px;overflow:hidden;transition:all .25s;}
.ex-card:hover{border-color:var(--border-h);transform:translateY(-4px);}
.ex-body{padding:16px;}
.ex-header{display:flex;align-items:center;gap:10px;margin-bottom:11px;}
.ex-av{width:34px;height:34px;border-radius:50%;overflow:hidden;border:2px solid rgba(0,212,255,0.18);}
.ex-name{font-size:.78rem;font-weight:700;}
.swap-box{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:11px;margin-bottom:10px;}
.swap-skill{font-size:.84rem;font-weight:800;}
.ex-desc{font-size:.7rem;color:var(--dim);margin-bottom:10px;}
.connect-btn{background:var(--cyan);color:#000;border:none;border-radius:8px;padding:8px 14px;font-size:.68rem;font-weight:800;cursor:pointer;width:100%;}

/* Empty State */
.empty-state{text-align:center;padding:60px 20px;color:var(--muted);}
</style>
</head>
<body>
<div class="bg-glow"></div>

<div id="loadScreen">
  <div class="load-logo">ZWAPY</div>
  <div class="load-bar"><div class="load-fill"></div></div>
  <div class="load-text">Loading skill exchange...</div>
</div>

<div class="layout">
  <header class="topbar">
    <a href="dashboard.html" class="topbar-logo">
      <div class="logo-node">
        <img src="assets/zwapy-logo.png" style="width:26px;height:26px;object-fit:contain;">
      </div>
      <span class="logo-text">ZWAPY</span>
    </a>
    <a href="dashboard.html" class="back-btn">← Back to Dashboard</a>
  </header>

  <div class="page-head">
    <div class="page-label">// PEER LEARNING</div>
    <h1 class="page-title">Skill <span>Exchange</span></h1>
    <p class="page-sub">Offer what you know. Get what you need. Earn coins & certificates.</p>
  </div>

  <!-- Post Form -->
  <div class="post-card">
    <div class="field">
      <label>I Can Teach *</label>
      <input type="text" id="offerSkill" placeholder="e.g. Python, UI Design">
    </div>
    <div class="field">
      <label>I Want to Learn *</label>
      <input type="text" id="needSkill" placeholder="e.g. Video Editing, SQL">
    </div>
    <button class="post-btn" id="postBtn">Post Request →</button>
  </div>

  <!-- Exchange Grid -->
  <div class="ex-grid" id="exGrid">
    <!-- Will be populated by JS -->
  </div>
</div>

<script>
// Simple placeholder for now (you can connect Firebase later)
let exchanges = [];

function renderExchanges() {
  const grid = document.getElementById('exGrid');
  if (exchanges.length === 0) {
    grid.innerHTML = `<div class="empty-state"><p>No exchanges yet. Post your first request!</p></div>`;
    return;
  }
  grid.innerHTML = exchanges.map(ex => `
    <div class="ex-card">
      <div class="ex-body">
        <div class="ex-header">
          <div class="ex-av"><img src="https://api.dicebear.com/7.x/avataaars/svg?seed=${ex.name}" alt=""></div>
          <div class="ex-name">${ex.name || 'Student'}</div>
        </div>
        <div class="swap-box">
          <div style="flex:1"><strong>Offering:</strong> ${ex.offer}</div>
          <div style="opacity:0.4">↔</div>
          <div style="flex:1"><strong>Needs:</strong> ${ex.need}</div>
        </div>
        <button class="connect-btn">Connect →</button>
      </div>
    </div>
  `).join('');
}

// Post new request
document.getElementById('postBtn').addEventListener('click', () => {
  const offer = document.getElementById('offerSkill').value.trim();
  const need = document.getElementById('needSkill').value.trim();
  if (!offer || !need) {
    alert('Please fill both fields');
    return;
  }
  exchanges.unshift({
    name: 'You',
    offer: offer,
    need: need
  });
  renderExchanges();
  document.getElementById('offerSkill').value = '';
  document.getElementById('needSkill').value = '';
});

// Initial render
renderExchanges();
</script>
</body>
</html>
