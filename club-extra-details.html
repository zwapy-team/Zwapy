<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Club Setup | Zwapy</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
:root{--cyan:#00D4FF;--bg:#010114;--border:rgba(0,212,255,0.15);--muted:#64748b;--dim:#94a3b8;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Sora',sans-serif;background:var(--bg);color:white;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.glow{position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse 60% 50% at 50% 0%,rgba(0,212,255,0.06) 0%,transparent 70%);z-index:0;}
.card{position:relative;z-index:1;width:100%;max-width:440px;background:rgba(2,0,36,0.85);border:1px solid var(--border);border-radius:28px;padding:36px 32px;backdrop-filter:blur(20px);}
.card::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:60%;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);}
.logo{display:flex;align-items:center;justify-content:center;gap:9px;margin-bottom:24px;text-decoration:none;}
.logo span{font-size:1.4rem;font-weight:900;font-style:italic;}
.badge{display:inline-block;background:rgba(99,102,241,0.1);border:1px solid rgba(99,102,241,0.3);color:#818cf8;border-radius:100px;padding:4px 12px;font-size:.65rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;margin-bottom:16px;}
.card h2{font-size:1.35rem;font-weight:900;font-style:italic;margin-bottom:5px;}
.card .sub{font-size:.76rem;color:var(--dim);margin-bottom:24px;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:.63rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);margin-bottom:6px;}
.field input,.field select,.field textarea{width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:13px 16px;font-size:.88rem;color:white;font-family:'Sora',sans-serif;outline:none;transition:border-color .2s;}
.field input::placeholder,.field textarea::placeholder{color:var(--muted);}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--cyan);}
.field textarea{resize:vertical;min-height:80px;}
.field select option{background:#020024;}
.btn{width:100%;background:var(--cyan);color:#000;border:none;border-radius:12px;padding:14px;font-size:.88rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:all .25s;margin-top:4px;}
.btn:hover{box-shadow:0 0 24px rgba(0,212,255,.4);transform:translateY(-1px);}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.msg{display:none;padding:10px 14px;border-radius:10px;font-size:.75rem;font-weight:600;margin-bottom:14px;text-align:center;}
.msg.error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.25);color:#ef4444;}
.msg.success{background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.25);color:#10b981;}
</style>
</head>
<body>
<div class="glow"></div>
<div class="card">
  <a href="index.html" class="logo">
    <img src="assets/zwapy-logo.png" style="width:30px;height:30px;object-fit:contain;">
    <span>ZWAPY</span>
  </a>
  <div class="badge">🛡️ Club Head Setup</div>
  <h2>Set Up Your Club</h2>
  <p class="sub">Tell us about your club so students can find and join it</p>

  <div class="msg" id="msg"></div>

  <form id="clubForm">
    <div class="field">
      <label>Club Name</label>
      <input type="text" id="clubName" placeholder="e.g. Tech Builders Club" required/>
    </div>
    <div class="field">
      <label>Club Category</label>
      <select id="clubCategory">
        <option value="Technology">Technology</option>
        <option value="Design">Design</option>
        <option value="Business">Business</option>
        <option value="Arts">Arts & Culture</option>
        <option value="Sports">Sports</option>
        <option value="Science">Science</option>
        <option value="Other">Other</option>
      </select>
    </div>
    <div class="field">
      <label>Club Description</label>
      <textarea id="clubDesc" placeholder="What does your club do? What can members expect?"></textarea>
    </div>
    <div class="field">
      <label>University</label>
      <input type="text" id="university" placeholder="e.g. Presidency University" required/>
    </div>
    <button type="submit" class="btn" id="submitBtn">Launch My Club →</button>
  </form>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-auth.js";
import { getFirestore, doc, updateDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyBazCIc5vdQInSwvqvohIcbPToTjnw7KJI",
  authDomain:"zwapy-25.firebaseapp.com",
  projectId:"zwapy-25",
  storageBucket:"zwapy-25.firebasestorage.app",
  messagingSenderId:"30612332450",
  appId:"1:30612332450:web:9e23f36a69f89dbb325cfb"
});
const auth = getAuth(app);
const db   = getFirestore(app);

onAuthStateChanged(auth, user=>{
  if(!user) window.location.href='login.html';
});

function showMsg(t,type){const m=document.getElementById('msg');m.textContent=t;m.className='msg '+type;m.style.display='block';}

document.getElementById('clubForm').addEventListener('submit', async e=>{
  e.preventDefault();
  const btn      = document.getElementById('submitBtn');
  const clubName = document.getElementById('clubName').value.trim();
  const category = document.getElementById('clubCategory').value;
  const desc     = document.getElementById('clubDesc').value.trim();
  const uni      = document.getElementById('university').value.trim();

  if(!clubName||!uni){showMsg('❌ Please fill in all required fields','error');return;}
  btn.disabled=true;btn.textContent='Saving...';

  const user = auth.currentUser;
  try{
    // Update user doc
    await updateDoc(doc(db,'users',user.uid),{
      clubName, clubCategory:category, clubDesc:desc,
      university:uni
    });
    // Create club doc in clubs collection
    await setDoc(doc(db,'clubs',user.uid),{
      name:clubName, category, desc,
      university:uni,
      headUid:user.uid,
      headName:user.displayName||'Club Head',
      members:[],
      createdAt:serverTimestamp()
    });
    showMsg('✅ Club created! Loading your portal...','success');
    setTimeout(()=>window.location.href='club-dashboard.html', 900);
  }catch(err){
    showMsg('❌ '+err.message,'error');
    btn.disabled=false;btn.textContent='Launch My Club →';
  }
});
</script>
</body>
</html>
