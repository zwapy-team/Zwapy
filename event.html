<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Events | Zwapy</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<!-- QR Code library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root{--cyan:#00D4FF;--cyan-dim:rgba(0,212,255,0.1);--bg:#010114;--border:rgba(0,212,255,0.1);--border-h:rgba(0,212,255,0.3);--muted:#64748b;--dim:#94a3b8;--green:#10b981;--amber:#f59e0b;--indigo:#818cf8;--pink:#f472b6;}
*{margin:0;padding:0;box-sizing:border-box;}
::selection{background:var(--cyan);color:#000;}
body{font-family:'Sora',sans-serif;background:var(--bg);color:white;overflow-x:hidden;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.022) 2px,rgba(0,0,0,0.022) 4px);pointer-events:none;z-index:9999;}
.bg-glow{position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse 60% 40% at 20% 10%,rgba(0,212,255,0.05) 0%,transparent 60%),radial-gradient(ellipse 40% 40% at 80% 80%,rgba(244,114,182,0.04) 0%,transparent 55%);}

#loadScreen{position:fixed;inset:0;background:var(--bg);z-index:10000;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;transition:opacity .4s;}
#loadScreen.hide{opacity:0;pointer-events:none;}
.load-logo{font-size:2rem;font-weight:900;font-style:italic;color:var(--cyan);}
.load-bar{width:140px;height:2px;background:rgba(0,212,255,0.1);border-radius:100px;overflow:hidden;}
.load-fill{height:100%;background:linear-gradient(90deg,var(--cyan),var(--pink));border-radius:100px;animation:lf 1s ease forwards;}
@keyframes lf{from{width:0}to{width:100%}}
.load-text{font-family:'Space Mono',monospace;font-size:.56rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);}

.layout{position:relative;z-index:10;max-width:1100px;margin:0 auto;padding:0 22px 120px;}

/* Topbar */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid rgba(0,212,255,0.06);margin-bottom:28px;position:sticky;top:0;z-index:200;background:rgba(1,1,20,0.93);backdrop-filter:blur(24px);margin-left:-22px;margin-right:-22px;padding-left:22px;padding-right:22px;gap:12px;}
.topbar-logo{display:flex;align-items:center;gap:9px;text-decoration:none;flex-shrink:0;}
.logo-node{width:38px;height:38px;background:rgba(0,212,255,0.07);border:1px solid rgba(0,212,255,0.2);border-radius:11px;display:flex;align-items:center;justify-content:center;}
.logo-text{font-size:1.25rem;font-weight:900;font-style:italic;}
.topbar-right{display:flex;align-items:center;gap:8px;}
.coins-pill{display:flex;align-items:center;gap:6px;background:rgba(0,212,255,0.07);border:1px solid rgba(0,212,255,0.2);border-radius:100px;padding:6px 14px;font-family:'Space Mono',monospace;font-size:.72rem;font-weight:700;color:var(--cyan);}
.back-btn{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:100px;padding:7px 14px;font-size:.72rem;font-weight:700;color:var(--dim);text-decoration:none;transition:all .2s;}
.back-btn:hover{border-color:var(--border-h);color:white;}

/* Page head */
.page-head{margin-bottom:28px;}
.page-label{font-family:'Space Mono',monospace;font-size:.55rem;letter-spacing:.22em;text-transform:uppercase;color:var(--cyan);opacity:.6;margin-bottom:5px;}
.page-title{font-size:clamp(1.8rem,5vw,3rem);font-weight:900;font-style:italic;letter-spacing:-.03em;line-height:1;}
.page-title span{background:linear-gradient(90deg,var(--cyan),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.page-sub{font-size:.82rem;color:var(--dim);margin-top:8px;}

/* Tabs */
.tab-row{display:flex;gap:8px;margin-bottom:24px;border-bottom:1px solid rgba(255,255,255,0.06);padding-bottom:0;}
.tab-btn{background:none;border:none;border-bottom:2px solid transparent;padding:10px 18px;font-size:.78rem;font-weight:700;color:var(--muted);cursor:pointer;transition:all .2s;font-family:'Sora',sans-serif;margin-bottom:-1px;white-space:nowrap;}
.tab-btn.active{color:var(--cyan);border-bottom-color:var(--cyan);}
.tab-content{display:none;}
.tab-content.active{display:block;}

/* Filter bar */
.filter-bar{display:flex;gap:8px;margin-bottom:22px;flex-wrap:wrap;align-items:center;}
.search-wrap{flex:1;min-width:160px;position:relative;}
.si{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:.85rem;pointer-events:none;}
.search-input{width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:11px;padding:11px 14px 11px 36px;font-size:.84rem;color:white;font-family:'Sora',sans-serif;outline:none;transition:border-color .2s;}
.search-input::placeholder{color:var(--muted);}
.search-input:focus{border-color:var(--cyan);}
.ftabs{display:flex;gap:6px;flex-wrap:wrap;}
.ftab{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:100px;padding:7px 13px;font-size:.68rem;font-weight:700;cursor:pointer;transition:all .2s;color:var(--muted);white-space:nowrap;}
.ftab.active{background:rgba(0,212,255,0.1);border-color:rgba(0,212,255,0.3);color:var(--cyan);}
.ftab:hover:not(.active){color:white;border-color:rgba(255,255,255,0.2);}

/* Events grid */
.events-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;}

/* Event card */
.event-card{background:rgba(255,255,255,0.025);border:1px solid var(--border);border-radius:22px;overflow:hidden;transition:all .3s;position:relative;}
.event-card:hover{border-color:var(--border-h);transform:translateY(-4px);}
.event-poster{width:100%;height:160px;object-fit:cover;display:block;}
.event-poster-placeholder{width:100%;height:160px;background:linear-gradient(135deg,rgba(0,212,255,0.08),rgba(244,114,182,0.08));display:flex;align-items:center;justify-content:center;font-size:3rem;}
.event-body{padding:20px;}
.event-header{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:10px;}
.event-type-pill{font-family:'Space Mono',monospace;font-size:.5rem;letter-spacing:.1em;text-transform:uppercase;padding:3px 9px;border-radius:100px;flex-shrink:0;}
.event-title{font-size:1rem;font-weight:800;margin-bottom:6px;line-height:1.3;}
.event-organizer{font-size:.68rem;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:5px;}
.event-meta{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;}
.emr{display:flex;align-items:center;gap:6px;font-size:.72rem;color:var(--dim);}
.event-footer{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
.ticket-price{display:flex;align-items:center;gap:5px;}
.tp-free{font-size:.78rem;font-weight:800;color:var(--green);}
.tp-coins{font-family:'Space Mono',monospace;font-size:.9rem;font-weight:700;color:var(--amber);}
.tp-label{font-size:.6rem;color:var(--muted);}
.seats-left{font-size:.66rem;color:var(--muted);}
.buy-btn{background:var(--cyan);color:#000;border:none;border-radius:9px;padding:9px 20px;font-size:.74rem;font-weight:800;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;transition:all .25s;font-family:'Sora',sans-serif;white-space:nowrap;}
.buy-btn:hover{box-shadow:0 0 14px rgba(0,212,255,.4);transform:translateY(-1px);}
.buy-btn.free{background:var(--green);}
.buy-btn.free:hover{box-shadow:0 0 14px rgba(16,185,129,.4);}
.buy-btn.bought{background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.25);color:var(--green);cursor:default;}
.buy-btn.sold-out{background:rgba(255,255,255,0.05);color:var(--muted);cursor:not-allowed;}

/* Ticket card */
.ticket-card{background:rgba(255,255,255,0.025);border:1px solid var(--border);border-radius:20px;overflow:hidden;margin-bottom:14px;transition:border-color .3s;}
.ticket-card:hover{border-color:var(--border-h);}
.ticket-top-bar{height:4px;}
.ticket-body{padding:20px;display:flex;gap:18px;align-items:center;flex-wrap:wrap;}
.ticket-qr{width:80px;height:80px;flex-shrink:0;background:white;border-radius:10px;padding:4px;display:flex;align-items:center;justify-content:center;}
.ticket-info{flex:1;min-width:0;}
.ticket-event-name{font-size:.95rem;font-weight:800;margin-bottom:4px;}
.ticket-meta{font-size:.7rem;color:var(--muted);line-height:1.7;}
.ticket-id{font-family:'Space Mono',monospace;font-size:.58rem;color:var(--cyan);margin-top:4px;}
.ticket-status{display:flex;align-items:center;gap:5px;background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.2);border-radius:100px;padding:4px 10px;font-size:.62rem;font-weight:700;color:var(--green);flex-shrink:0;}
.ts-dot{width:5px;height:5px;background:var(--green);border-radius:50%;}

/* Buy confirmation modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.82);backdrop-filter:blur(10px);z-index:3000;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .3s;}
.modal-bg.open{opacity:1;pointer-events:all;}
.modal{background:rgba(2,0,36,0.98);border:1px solid rgba(0,212,255,0.18);border-radius:26px;width:100%;max-width:420px;position:relative;transform:translateY(20px) scale(.97);transition:transform .3s;overflow:hidden;}
.modal-bg.open .modal{transform:translateY(0) scale(1);}
.modal-bar{height:3px;background:linear-gradient(90deg,var(--cyan),var(--pink));}
.modal-body{padding:28px;}
.modal-close{position:absolute;top:14px;right:14px;width:30px;height:30px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.75rem;color:var(--muted);transition:all .2s;}
.modal-close:hover{border-color:#ef4444;color:#ef4444;}
.modal-event-name{font-size:1.2rem;font-weight:900;font-style:italic;margin-bottom:6px;}
.modal-detail{font-size:.78rem;color:var(--dim);margin-bottom:4px;}
.coin-deduct-box{background:rgba(245,158,11,0.07);border:1px solid rgba(245,158,11,0.2);border-radius:14px;padding:16px;margin:18px 0;display:flex;align-items:center;justify-content:space-between;}
.cdb-left{font-size:.8rem;color:var(--dim);}
.cdb-left strong{color:white;display:block;margin-bottom:2px;}
.cdb-right{font-family:'Space Mono',monospace;font-size:1.4rem;font-weight:700;color:var(--amber);}
.balance-after{font-size:.72rem;color:var(--muted);text-align:right;margin-top:-10px;margin-bottom:14px;}
.confirm-btn{width:100%;background:var(--cyan);color:#000;border:none;border-radius:12px;padding:14px;font-size:.88rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:all .25s;font-family:'Sora',sans-serif;}
.confirm-btn:hover{box-shadow:0 0 20px rgba(0,212,255,.4);transform:translateY(-1px);}
.confirm-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.confirm-btn.free-btn{background:var(--green);}

/* Ticket success modal */
.success-modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.88);backdrop-filter:blur(12px);z-index:4000;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .3s;}
.success-modal-bg.open{opacity:1;pointer-events:all;}
.success-modal{background:rgba(2,0,36,0.98);border:1px solid rgba(16,185,129,0.25);border-radius:26px;width:100%;max-width:380px;padding:32px 28px;text-align:center;position:relative;transform:scale(.95);transition:transform .3s;}
.success-modal-bg.open .success-modal{transform:scale(1);}
.sm-icon{font-size:2.5rem;margin-bottom:14px;}
.sm-title{font-size:1.3rem;font-weight:900;font-style:italic;margin-bottom:6px;}
.sm-sub{font-size:.78rem;color:var(--dim);margin-bottom:20px;}
.sm-qr{width:140px;height:140px;background:white;border-radius:14px;padding:6px;margin:0 auto 16px;}
.sm-ticket-id{font-family:'Space Mono',monospace;font-size:.68rem;color:var(--cyan);margin-bottom:18px;}
.sm-close{width:100%;background:var(--green);color:#000;border:none;border-radius:12px;padding:13px;font-size:.85rem;font-weight:800;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;font-family:'Sora',sans-serif;transition:all .25s;}
.sm-close:hover{box-shadow:0 0 18px rgba(16,185,129,.4);}

/* Empty */
.empty-state{text-align:center;padding:48px 20px;color:var(--muted);}
.empty-icon{font-size:2.5rem;margin-bottom:12px;opacity:.3;}
.empty-text{font-size:.8rem;line-height:1.6;}

/* Toast */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);border-radius:100px;padding:10px 22px;font-size:.76rem;font-weight:700;z-index:5000;opacity:0;transition:all .35s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.success{background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,.28);color:var(--green);}
.toast.error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,.28);color:#ef4444;}

/* Bottom nav */
.bottom-nav{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);width:calc(100% - 32px);max-width:380px;background:rgba(2,0,36,0.95);backdrop-filter:blur(28px);border:1px solid rgba(0,212,255,0.14);border-radius:100px;padding:7px 12px;display:flex;justify-content:space-around;align-items:center;z-index:500;box-shadow:0 8px 32px rgba(0,0,0,.6);}
.nav-item{width:42px;height:42px;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:all .22s;text-decoration:none;color:var(--muted);font-size:1.1rem;}
.nav-item.active{background:rgba(0,212,255,0.11);color:var(--cyan);}
.nav-item:hover{background:rgba(0,212,255,0.08);color:var(--cyan);}
.nav-av{width:26px;height:26px;border-radius:50%;border:2px solid rgba(0,212,255,.28);overflow:hidden;}
.nav-av img{width:100%;height:100%;object-fit:cover;}

.fade-up{opacity:0;transform:translateY(16px);transition:opacity .6s ease,transform .6s ease;}
.fade-up.in{opacity:1;transform:translateY(0);}
.d1{transition-delay:.05s;}.d2{transition-delay:.1s;}.d3{transition-delay:.15s;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:rgba(0,212,255,0.16);border-radius:100px;}
</style>
</head>
<body>
<div class="bg-glow"></div>

<div id="loadScreen">
  <div class="load-logo">ZWAPY</div>
  <div class="load-bar"><div class="load-fill"></div></div>
  <div class="load-text">Loading events...</div>
</div>

<div class="toast" id="toast"></div>

<!-- BUY CONFIRMATION MODAL -->
<div class="modal-bg" id="buyModal">
  <div class="modal">
    <div class="modal-bar"></div>
    <div class="modal-body">
      <button class="modal-close" id="buyModalClose">✕</button>
      <div style="font-family:'Space Mono',monospace;font-size:.56rem;letter-spacing:.18em;text-transform:uppercase;color:var(--cyan);margin-bottom:12px;">🎟️ Confirm Ticket</div>
      <div class="modal-event-name" id="buyEventName"></div>
      <div class="modal-detail" id="buyEventDate"></div>
      <div class="modal-detail" id="buyEventVenue"></div>
      <div class="coin-deduct-box" id="coinBox">
        <div class="cdb-left"><strong>Ticket Cost</strong>Skill Coins required</div>
        <div class="cdb-right" id="buyCost"></div>
      </div>
      <div class="balance-after" id="balanceAfter"></div>
      <button class="confirm-btn" id="confirmBuyBtn">Confirm & Get Ticket →</button>
    </div>
  </div>
</div>

<!-- TICKET SUCCESS MODAL -->
<div class="success-modal-bg" id="successModal">
  <div class="success-modal">
    <div class="sm-icon">🎉</div>
    <div class="sm-title">Ticket Confirmed!</div>
    <div class="sm-sub">Your ticket has been saved. Show this QR code at the event.</div>
    <div class="sm-qr" id="successQR"></div>
    <div class="sm-ticket-id" id="successTicketId"></div>
    <button class="sm-close" id="successClose">View My Tickets →</button>
  </div>
</div>

<div class="layout">
  <header class="topbar">
    <a href="dashboard.html" class="topbar-logo">
      <div class="logo-node">
        <img src="assets/zwapy-logo.png" style="width:26px;height:26px;object-fit:contain;">
      </div>
      <span class="logo-text">ZWAPY</span>
    </a>
    <div class="topbar-right">
      <div class="coins-pill">💰 <span id="coinsDisplay">—</span> coins</div>
      <a href="dashboard.html" class="back-btn">← Dashboard</a>
    </div>
  </header>

  <!-- PAGE HEAD -->
  <div class="page-head fade-up d1">
    <div class="page-label">// Campus Events</div>
    <h1 class="page-title">Events <span>Portal</span></h1>
    <p class="page-sub">Big campus events, hackathons and workshops. Use your Skill Coins to grab tickets.</p>
  </div>

  <!-- TABS -->
  <div class="tab-row fade-up d2">
    <button class="tab-btn active" onclick="switchTab('browse',this)">🎪 Browse Events</button>
    <button class="tab-btn" onclick="switchTab('mytickets',this)">🎟️ My Tickets</button>
  </div>

  <!-- BROWSE TAB -->
  <div class="tab-content active
